<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Yahtzee Live</title>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --bg:#1a1a2e;--surface:#16213e;--card:#0f3460;--accent:#e94560;
  --gold:#f5c842;--green:#34d97b;--red:#f0504d;--blue:#4f8ef7;
  --text:#f0f0f5;--muted:#6e7a9a;--border:#1e2d50;--r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;
  background-image:radial-gradient(circle at 20% 20%,rgba(233,69,96,.08) 0,transparent 50%),
                   radial-gradient(circle at 80% 80%,rgba(79,142,247,.08) 0,transparent 50%);
  pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:16px 12px 110px;}

/* HEADER */
.hdr{text-align:center;padding:20px 0 12px;}
.logo{font-family:'Permanent Marker',cursive;font-size:clamp(2.4rem,10vw,3.4rem);
  color:var(--gold);text-shadow:3px 3px 0 rgba(0,0,0,.4),0 0 30px rgba(245,200,66,.4);letter-spacing:2px;line-height:1;}
.logo span{color:var(--accent);}
.meta-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;font-size:.78rem;color:var(--muted);margin-top:8px;}
.meta-row span{display:flex;align-items:center;gap:4px;}

/* CONN */
.conn{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--border);
  border-radius:50px;padding:6px 14px;margin:10px auto;width:fit-content;font-size:.76rem;color:var(--muted);}
.cdot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:background .4s;}
.cdot.on{background:var(--green);}.cdot.off{background:var(--red);}

/* SETUP */
.setup-screen{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px 20px;margin-bottom:20px;}
.setup-screen h2{font-family:'Permanent Marker',cursive;color:var(--gold);font-size:1.3rem;margin-bottom:16px;text-align:center;}
.player-inputs{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.pi-row{display:flex;align-items:center;gap:8px;}
.pi-row input{flex:1;background:var(--card);border:1.5px solid var(--border);color:var(--text);
  border-radius:10px;padding:10px 14px;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:700;outline:none;transition:border-color .2s;}
.pi-row input:focus{border-color:var(--gold);}
.pi-row input::placeholder{color:var(--muted);font-weight:400;}
.pi-del{background:none;border:1px solid var(--border);color:var(--muted);width:32px;height:32px;
  border-radius:50%;cursor:pointer;font-size:1rem;transition:all .2s;line-height:1;}
.pi-del:hover{background:var(--red);border-color:var(--red);color:#fff;}
.color-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.setup-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}

/* BUTTONS */
.btn{padding:10px 22px;border:none;border-radius:50px;cursor:pointer;font-family:'Nunito',sans-serif;
  font-size:.9rem;font-weight:800;display:inline-flex;align-items:center;gap:6px;transition:all .2s;letter-spacing:.3px;}
.btn:hover{transform:translateY(-2px);filter:brightness(1.1);}
.btn:active{transform:scale(.95);}
.btn-gold{background:var(--gold);color:#000;}
.btn-red{background:var(--accent);color:#fff;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-ghost{background:var(--surface);border:1.5px solid var(--border);color:var(--text);}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold);}
.btn-sm{padding:7px 16px;font-size:.8rem;}
.btn:disabled,.btn[disabled]{opacity:.45;cursor:not-allowed;transform:none !important;filter:none !important;}

/* DICE */
.dice-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 16px;margin-bottom:16px;}
.dice-label{font-size:.72rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:12px;text-align:center;font-weight:700;}
.dice-row{display:flex;justify-content:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.die-wrap{display:flex;flex-direction:column;align-items:center;}
.die{width:56px;height:56px;border-radius:10px;background:var(--card);border:2px solid var(--border);
  cursor:pointer;transition:transform .15s,border-color .2s,box-shadow .2s;
  display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.4);}
.die:hover{transform:scale(1.08);}
.die.held{border-color:var(--gold);background:rgba(245,200,66,.15);box-shadow:0 0 18px rgba(245,200,66,.5);}
.held-lbl{font-size:.54rem;font-weight:900;color:var(--gold);letter-spacing:1.5px;margin-top:5px;height:10px;text-align:center;}
.die.rolling{animation:diceRoll .45s ease-in-out;}
@keyframes diceRoll{
  0%{transform:rotate(0) scale(1);}25%{transform:rotate(18deg) scale(1.18);}
  50%{transform:rotate(-12deg) scale(.88);}75%{transform:rotate(6deg) scale(1.1);}100%{transform:rotate(0) scale(1);}
}
/* PIPS */
.pip-grid{display:grid;width:40px;height:40px;padding:4px;gap:2px;}
.pip{width:8px;height:8px;border-radius:50%;background:var(--text);}
.p1{grid-template:repeat(3,1fr)/repeat(3,1fr);}
.p1 .pip{grid-column:2;grid-row:2;align-self:center;justify-self:center;}
.p2{grid-template:repeat(2,1fr)/repeat(2,1fr);}
.p2 .pip:nth-child(1){grid-column:1;grid-row:1;align-self:start;justify-self:start;}
.p2 .pip:nth-child(2){grid-column:2;grid-row:2;align-self:end;justify-self:end;}
.p3{grid-template:repeat(3,1fr)/repeat(3,1fr);}
.p3 .pip:nth-child(1){grid-column:1;grid-row:1;}
.p3 .pip:nth-child(2){grid-column:2;grid-row:2;align-self:center;justify-self:center;}
.p3 .pip:nth-child(3){grid-column:3;grid-row:3;}
.p4{grid-template:repeat(2,1fr)/repeat(2,1fr);}
.p5{grid-template:repeat(3,1fr)/repeat(3,1fr);}
.p5 .pip:nth-child(1){grid-column:1;grid-row:1;}
.p5 .pip:nth-child(2){grid-column:3;grid-row:1;}
.p5 .pip:nth-child(3){grid-column:2;grid-row:2;align-self:center;justify-self:center;}
.p5 .pip:nth-child(4){grid-column:1;grid-row:3;}
.p5 .pip:nth-child(5){grid-column:3;grid-row:3;}
.p6{grid-template:repeat(3,1fr)/repeat(2,1fr);}
.dice-info{text-align:center;font-size:.78rem;color:var(--muted);margin-bottom:12px;}
.dice-info b{color:var(--gold);}
.dice-btns{display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:wrap;}
.roll-count{font-family:'Permanent Marker',cursive;font-size:1.1rem;color:var(--gold);}

/* SCORECARD */
.scorecard-wrap{margin-bottom:16px;}
.sc-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;}
.sc-tab{background:var(--surface);border:1.5px solid var(--border);border-radius:50px;
  padding:8px 16px;font-size:.8rem;font-weight:800;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0;}
.sc-tab.active{border-color:var(--gold);color:var(--gold);}
.tab-score{font-size:.68rem;display:block;color:var(--muted);}
.scorecard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.sc-row{display:grid;grid-template-columns:1fr 88px;border-bottom:1px solid var(--border);}
.sc-row:last-child{border-bottom:none;}
.sc-row.sec-hdr{background:rgba(233,69,96,.12);border-bottom:2px solid rgba(233,69,96,.3);}
.sc-row.sec-hdr .cat-name{font-size:.68rem;text-transform:uppercase;letter-spacing:2px;color:var(--accent);font-weight:900;}
.sc-row.total-row{background:rgba(245,200,66,.06);}
.sc-row.total-row .cat-name{font-weight:900;color:var(--gold);}
.sc-row.bonus-row{background:rgba(52,217,123,.06);}
.cat-cell{padding:10px 12px;display:flex;flex-direction:column;justify-content:center;}
.cat-name{font-size:.82rem;font-weight:700;color:var(--text);line-height:1.2;}
.cat-hint{font-size:.62rem;color:var(--muted);line-height:1.3;margin-top:2px;}
.score-cell{padding:6px 4px;display:flex;align-items:center;justify-content:center;}
.score-btn{width:100%;min-height:38px;border-radius:8px;border:1.5px solid var(--border);
  background:var(--card);color:var(--text);font-family:'Nunito',sans-serif;
  font-size:.9rem;font-weight:800;cursor:pointer;transition:all .2s;text-align:center;}
.score-btn:hover:not([disabled]){background:rgba(245,200,66,.1);border-color:var(--gold);color:var(--gold);}
.score-btn.filled{background:transparent;border-color:transparent;cursor:default;color:var(--gold);}
.score-btn.suggested{background:rgba(52,217,123,.15);border-color:var(--green);color:var(--green);
  animation:glow .9s ease-in-out infinite alternate;}
@keyframes glow{from{box-shadow:0 0 0 transparent}to{box-shadow:0 0 12px rgba(52,217,123,.6)}}
.score-btn.stat-val{background:transparent;border-color:transparent;color:var(--gold);cursor:default;}
.score-btn.stat-bonus{color:var(--green);}
.score-btn[disabled]:not(.filled):not(.stat-val):not(.stat-bonus){opacity:.35;cursor:not-allowed;}

/* PLAYERS BAR */
.players-bar{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;}
.player-badge{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;
  padding:8px 14px;font-size:.8rem;font-weight:700;white-space:nowrap;flex-shrink:0;}
.player-badge.active{background:rgba(245,200,66,.07);}
.pb-score{font-size:.7rem;color:var(--muted);display:block;}

/* ACTION BAR */
.action-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(26,26,46,.95);backdrop-filter:blur(12px);
  border-top:1px solid var(--border);padding:10px 16px 24px;
  display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}

/* QR MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;
  align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;}
.modal-bg.show{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:28px 24px;text-align:center;max-width:320px;width:90%;}
.modal h3{font-family:'Permanent Marker',cursive;color:var(--gold);font-size:1.5rem;margin-bottom:6px;}
.modal p{font-size:.8rem;color:var(--muted);margin-bottom:18px;}
#qr-box{display:flex;justify-content:center;margin-bottom:14px;}
#qr-box canvas,#qr-box img{border-radius:10px;}
.qr-url{font-size:.68rem;color:var(--muted);word-break:break-all;padding:7px 10px;
  background:var(--card);border-radius:8px;margin-bottom:16px;}

/* YAHTZEE BLAST */
.ytz-blast{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  z-index:500;pointer-events:none;opacity:0;transition:opacity .2s;}
.ytz-blast.show{opacity:1;}
.ytz-text{font-family:'Permanent Marker',cursive;font-size:min(18vw,110px);color:var(--gold);
  text-shadow:0 0 60px rgba(245,200,66,.9),4px 4px 0 var(--accent);
  animation:ytzPop .55s cubic-bezier(.175,.885,.32,1.275) forwards;}
@keyframes ytzPop{0%{transform:scale(0) rotate(-10deg)}60%{transform:scale(1.2) rotate(3deg)}100%{transform:scale(1) rotate(0)}}

/* TOAST */
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(60px);
  background:var(--green);color:#000;font-weight:800;padding:10px 22px;border-radius:50px;
  font-size:.85rem;z-index:300;transition:transform .3s;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* GAME OVER */
.gameover-screen{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:28px 20px;text-align:center;margin-bottom:20px;}
.gameover-screen h2{font-family:'Permanent Marker',cursive;color:var(--gold);font-size:2rem;margin-bottom:20px;}
.winner-name{font-family:'Permanent Marker',cursive;font-size:1.5rem;color:var(--accent);margin-bottom:8px;}
.final-scores{display:flex;flex-direction:column;gap:8px;margin:16px 0;}
.fs-row{display:flex;justify-content:space-between;align-items:center;
  background:var(--card);border-radius:10px;padding:10px 16px;}
.fs-score{font-family:'Permanent Marker',cursive;font-size:1.2rem;color:var(--gold);}

/* ERR */
.err-banner{background:rgba(240,80,77,.15);border:1px solid var(--red);border-radius:10px;
  padding:12px 16px;margin-bottom:14px;font-size:.82rem;color:#f9b0af;display:none;}
.err-banner.show{display:block;}

@media(max-width:380px){.die{width:48px;height:48px;}.pip-grid{width:34px;height:34px;}.pip{width:7px;height:7px;}}
</style>
</head>
<body>

<div class="ytz-blast" id="ytz-blast"><div class="ytz-text">YAHTZEE!</div></div>
<div class="modal-bg" id="qr-modal">
  <div class="modal">
    <h3>&#128242; Join Game</h3>
    <p>Scan to join &amp; see live scores on your device</p>
    <div id="qr-box"></div>
    <div class="qr-url" id="qr-url"></div>
    <button class="btn btn-ghost btn-sm" id="close-qr-btn">Close</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="err-banner" id="err-banner"></div>

<div class="app">
  <div class="hdr">
    <div class="logo">Yah<span>tzee</span></div>
    <div class="meta-row">
      <span>&#128197; <span id="date-disp"></span></span>
      <span>&#128336; <span id="time-disp"></span></span>
    </div>
  </div>
  <div class="conn"><div class="cdot" id="cdot"></div><span id="ctext">Connecting&hellip;</span></div>

  <!-- SETUP -->
  <div class="setup-screen" id="setup-screen">
    <h2>&#127922; New Game</h2>
    <div class="player-inputs" id="player-inputs"></div>
    <div class="setup-btns">
      <button class="btn btn-ghost btn-sm" id="add-player-btn">+ Add Player</button>
      <button class="btn btn-gold" id="start-game-btn">&#9654; Start Game</button>
    </div>
  </div>

  <!-- GAME -->
  <div id="game-area" style="display:none">
    <div class="players-bar" id="players-bar"></div>
    <div class="dice-section">
      <div class="dice-label" id="turn-label">Your Turn</div>
      <div class="dice-row" id="dice-row"></div>
      <div class="dice-info" id="dice-info">Roll the dice to begin your turn!</div>
      <div class="dice-btns">
        <button class="btn btn-red" id="roll-btn">&#127922; Roll Dice</button>
        <span class="roll-count" id="roll-count">3 rolls left</span>
      </div>
    </div>
    <div class="scorecard-wrap">
      <div class="sc-tabs" id="sc-tabs"></div>
      <div class="scorecard" id="scorecard"></div>
    </div>
  </div>

  <!-- GAME OVER -->
  <div id="gameover-area" style="display:none">
    <div class="gameover-screen">
      <h2>&#127942; Game Over!</h2>
      <div class="winner-name" id="winner-name"></div>
      <div class="final-scores" id="final-scores"></div>
      <button class="btn btn-gold" id="play-again-btn" style="margin-top:12px">&#127922; Play Again</button>
    </div>
  </div>
</div>

<div class="action-bar">
  <button class="btn btn-blue btn-sm" id="qr-btn">&#128242; QR Code</button>
  <button class="btn btn-ghost btn-sm" id="new-game-btn">&#8635; New Game</button>
</div>

<!-- Firebase module — self-contained, no onclick in HTML -->
<script type="module">
import { initializeApp }                   from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getDatabase, ref, set, update, onValue } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

// ══ FIREBASE ═══════════════════════════════════════════
const fbApp = initializeApp({ databaseURL:'https://scoreboard-1677c-default-rtdb.firebaseio.com/' });
const db    = getDatabase(fbApp);
const ROOT  = 'yahtzee';

// ══ AUDIO ══════════════════════════════════════════════
let _ac = null;
const ac = () => _ac || (_ac = new (window.AudioContext||window.webkitAudioContext)());

function playDing() {
  try {
    const c=ac(), o=c.createOscillator(), g=c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type='sine';
    o.frequency.setValueAtTime(880,c.currentTime);
    o.frequency.exponentialRampToValueAtTime(1320,c.currentTime+.1);
    g.gain.setValueAtTime(.35,c.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.38);
    o.start(); o.stop(c.currentTime+.4);
  } catch(e){}
}
function playRoll() {
  try {
    const c=ac();
    [0,.05,.1,.15,.2].forEach(t=>{
      const o=c.createOscillator(), g=c.createGain();
      o.connect(g); g.connect(c.destination); o.type='triangle';
      o.frequency.setValueAtTime(150+Math.random()*350, c.currentTime+t);
      g.gain.setValueAtTime(.12, c.currentTime+t);
      g.gain.exponentialRampToValueAtTime(.001, c.currentTime+t+.09);
      o.start(c.currentTime+t); o.stop(c.currentTime+t+.1);
    });
  } catch(e){}
}
function playFanfare() {
  try {
    const c=ac(), notes=[523,659,784,1047,1319];
    notes.forEach((f,i)=>{
      const o=c.createOscillator(), g=c.createGain();
      o.connect(g); g.connect(c.destination); o.type='triangle';
      const t=c.currentTime+i*.15;
      o.frequency.setValueAtTime(f,t);
      g.gain.setValueAtTime(.38,t); g.gain.exponentialRampToValueAtTime(.001,t+.42);
      o.start(t); o.stop(t+.45);
    });
  } catch(e){}
}

// ══ CONSTANTS ══════════════════════════════════════════
const COLORS=['#f5c842','#34d97b','#f07844','#4f8ef7','#a78bfa','#f0504d','#22d3ee'];
const CATS=[
  {id:'aces',    name:'Aces',          hint:'Sum of all 1s',        sec:'upper'},
  {id:'twos',    name:'Twos',          hint:'Sum of all 2s',        sec:'upper'},
  {id:'threes',  name:'Threes',        hint:'Sum of all 3s',        sec:'upper'},
  {id:'fours',   name:'Fours',         hint:'Sum of all 4s',        sec:'upper'},
  {id:'fives',   name:'Fives',         hint:'Sum of all 5s',        sec:'upper'},
  {id:'sixes',   name:'Sixes',         hint:'Sum of all 6s',        sec:'upper'},
  {id:'threeKind',name:'3 of a Kind',  hint:'Sum all dice',         sec:'lower'},
  {id:'fourKind', name:'4 of a Kind',  hint:'Sum all dice',         sec:'lower'},
  {id:'fullHouse',name:'Full House',   hint:'Score 25',             sec:'lower'},
  {id:'smStr',    name:'Sm. Straight', hint:'4 in a row = 30',      sec:'lower'},
  {id:'lgStr',    name:'Lg. Straight', hint:'5 in a row = 40',      sec:'lower'},
  {id:'yahtzee',  name:'YAHTZEE',      hint:'5 of a kind = 50',     sec:'lower'},
  {id:'chance',   name:'Chance',       hint:'Sum all dice',         sec:'lower'},
  {id:'yBonus',   name:'Yahtzee Bonus',hint:'+100 each extra',      sec:'lower'},
];
const UPPER  = CATS.filter(c=>c.sec==='upper').map(c=>c.id);
const LOWER  = CATS.filter(c=>c.sec==='lower').map(c=>c.id);
const SCORED = CATS.filter(c=>c.id!=='yBonus').map(c=>c.id);

// ══ STATE ══════════════════════════════════════════════
let players=[],currentTurnIdx=0,gameStarted=false,gameOver=false;
let ignoreRemote=false, qrDone=false, viewingPlayer=null;
let setupInputs=[];

// ══ CLOCK ══════════════════════════════════════════════
function updateClock(){
  const n=new Date();
  document.getElementById('date-disp').textContent=
    n.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric',year:'numeric'});
  document.getElementById('time-disp').textContent=
    n.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
}
updateClock(); setInterval(updateClock,1000);

// ══ FIREBASE LISTENERS ══════════════════════════════════
onValue(ref(db,'.info/connected'), s=>{
  const on=s.val();
  document.getElementById('cdot').className='cdot '+(on?'on':'off');
  document.getElementById('ctext').textContent=on?'Connected':'Offline…';
});
onValue(ref(db,ROOT), s=>{
  if(ignoreRemote) return;
  const d=s.val(); if(!d) return;
  applyRemote(d);
}, e=>showErr(e.message));

function pushPartial(p){ ignoreRemote=true; update(ref(db,ROOT),p).finally(()=>setTimeout(()=>ignoreRemote=false,400)); }
function pushAll(){
  ignoreRemote=true;
  set(ref(db,ROOT),{players,currentTurnIdx,gameStarted,gameOver})
    .finally(()=>setTimeout(()=>ignoreRemote=false,400));
}

function applyRemote(d){
  if(d.players)            players=d.players;
  if(d.currentTurnIdx!=null) currentTurnIdx=d.currentTurnIdx;
  if(d.gameStarted!=null)  gameStarted=d.gameStarted;
  if(d.gameOver!=null)     gameOver=d.gameOver;
  if(gameOver){
    show('gameover-area'); hide('setup-screen'); hide('game-area');
    renderGameOver(); return;
  }
  if(gameStarted){
    show('game-area'); hide('setup-screen'); hide('gameover-area');
    if(!viewingPlayer&&players.length) viewingPlayer=players[currentTurnIdx].id;
    renderGame();
  }
}

// ══ SETUP ══════════════════════════════════════════════
function initSetup(){
  setupInputs=[{name:'',color:COLORS[0]},{name:'',color:COLORS[1]}];
  renderSetupInputs();
}

function renderSetupInputs(){
  const c=document.getElementById('player-inputs');
  c.innerHTML='';
  setupInputs.forEach((p,i)=>{
    const row=document.createElement('div'); row.className='pi-row';
    // Color dot
    const dot=document.createElement('div'); dot.className='color-dot'; dot.style.background=p.color;
    // Input
    const inp=document.createElement('input'); inp.type='text';
    inp.placeholder='Player '+(i+1)+' name'; inp.value=p.name; inp.maxLength=16;
    inp.addEventListener('input',()=>{ setupInputs[i].name=inp.value; });
    row.appendChild(dot); row.appendChild(inp);
    // Delete btn
    if(setupInputs.length>1){
      const del=document.createElement('button'); del.className='pi-del'; del.textContent='×';
      del.addEventListener('click',()=>{ setupInputs.splice(i,1); renderSetupInputs(); });
      row.appendChild(del);
    }
    c.appendChild(row);
  });
}

function addPlayerInput(){
  if(setupInputs.length>=6){ showToast('Max 6 players'); return; }
  setupInputs.push({name:'',color:COLORS[setupInputs.length%COLORS.length]});
  renderSetupInputs();
}

function startGame(){
  const names=setupInputs.map((p,i)=>p.name.trim()||'Player '+(i+1));
  players=names.map((n,i)=>({
    id:'p'+i, name:n, color:COLORS[i%COLORS.length],
    scores:{}, rollsLeft:3, dice:[1,1,1,1,1], held:[false,false,false,false,false]
  }));
  viewingPlayer=players[0].id; currentTurnIdx=0; gameStarted=true; gameOver=false;
  show('game-area'); hide('setup-screen');
  pushAll(); renderGame();
}

// ══ RENDER GAME ════════════════════════════════════════
function renderGame(){ renderPlayersBar(); renderDice(); renderScorecard(); updateTurnLabel(); }

function renderPlayersBar(){
  const bar=document.getElementById('players-bar');
  const tabs=document.getElementById('sc-tabs');
  bar.innerHTML=''; tabs.innerHTML='';
  players.forEach((p,i)=>{
    const total=calcGrand(p.scores);
    const isActive=(i===currentTurnIdx);
    const isView=(p.id===viewingPlayer);
    // Badge
    const b=document.createElement('div'); b.className='player-badge'+(isActive?' active':'');
    b.style.borderColor=isActive?p.color:''; b.style.color=isActive?p.color:'';
    b.innerHTML=esc(p.name)+'<span class="pb-score">'+total+' pts</span>';
    bar.appendChild(b);
    // Tab
    const t=document.createElement('div'); t.className='sc-tab'+(isView?' active':'');
    t.style.borderColor=isView?p.color:''; t.style.color=isView?p.color:'';
    t.innerHTML=esc(p.name)+'<span class="tab-score">'+total+' pts &bull; '+countFilled(p.scores)+'/'+SCORED.length+'</span>';
    t.addEventListener('click',()=>{ viewingPlayer=p.id; renderPlayersBar(); renderScorecard(); });
    tabs.appendChild(t);
  });
}

function updateTurnLabel(){
  const cp=players[currentTurnIdx]; if(!cp) return;
  document.getElementById('turn-label').textContent=cp.name+"'s Turn";
  const rb=document.getElementById('roll-btn');
  rb.disabled=cp.rollsLeft<=0;
  document.getElementById('roll-count').textContent=
    cp.rollsLeft>0 ? cp.rollsLeft+' roll'+(cp.rollsLeft!==1?'s':'')+' left' : 'No rolls left';
}

// ══ DICE ═══════════════════════════════════════════════
function renderDice(){
  const cp=players[currentTurnIdx]; if(!cp) return;
  const row=document.getElementById('dice-row'); row.innerHTML='';
  for(let i=0;i<5;i++){
    const wrap=document.createElement('div'); wrap.className='die-wrap';
    const die=document.createElement('div'); die.className='die'+(cp.held[i]?' held':'');
    die.appendChild(makePips(cp.dice[i]));
    die.addEventListener('click',()=>toggleHold(i));
    const lbl=document.createElement('div'); lbl.className='held-lbl';
    lbl.textContent=cp.held[i]?'HELD':'';
    wrap.appendChild(die); wrap.appendChild(lbl);
    row.appendChild(wrap);
  }
}

function makePips(val){
  const g=document.createElement('div'); g.className='pip-grid p'+val;
  for(let i=0;i<val;i++){ const p=document.createElement('div'); p.className='pip'; g.appendChild(p); }
  return g;
}

function toggleHold(i){
  const cp=players[currentTurnIdx];
  if(!cp||cp.rollsLeft===3){ showToast('Roll first!'); return; }
  cp.held[i]=!cp.held[i];
  renderDice(); pushPartial({players});
}

function rollDice(){
  const cp=players[currentTurnIdx];
  if(!cp||cp.rollsLeft<=0) return;
  playRoll();
  const dies=document.querySelectorAll('.die');
  dies.forEach((d,i)=>{ if(!cp.held[i]) d.classList.add('rolling'); });
  setTimeout(()=>document.querySelectorAll('.die').forEach(d=>d.classList.remove('rolling')),460);
  cp.dice=cp.dice.map((v,i)=>cp.held[i]?v:Math.ceil(Math.random()*6));
  cp.rollsLeft--;
  document.getElementById('dice-info').innerHTML=
    cp.rollsLeft===0
      ? '<b style="color:var(--accent)">No rolls left — pick a score!</b>'
      : 'Tap dice to <b>hold</b>, then roll again';
  setTimeout(()=>{ renderDice(); renderScorecard(); updateTurnLabel(); pushPartial({players}); },50);
}

// ══ SCORECARD ══════════════════════════════════════════
function renderScorecard(){
  const sc=document.getElementById('scorecard');
  const vp=players.find(p=>p.id===viewingPlayer)||players[0];
  if(!vp){ sc.innerHTML=''; return; }
  const cp=players[currentTurnIdx];
  const myTurn=cp&&cp.id===vp.id&&cp.rollsLeft<3;

  sc.innerHTML='';

  // Upper section
  sc.appendChild(makeSectionHdr('UPPER SECTION'));
  CATS.filter(c=>c.sec==='upper').forEach(cat=>{
    const filled=vp.scores[cat.id]!==undefined;
    const sugg=(!filled&&myTurn)?calcScore(cat.id,cp.dice):null;
    sc.appendChild(makeScoreRow(cat,vp,filled,sugg,myTurn));
  });
  sc.appendChild(makeTotalRow('Upper Score',calcUpperRaw(vp.scores),''));
  const bonus=calcUpperRaw(vp.scores)>=63?35:0;
  sc.appendChild(makeTotalRow('Bonus (≥63=+35)',bonus?'+35':'—','bonus-row','stat-bonus'));

  // Lower section
  sc.appendChild(makeSectionHdr('LOWER SECTION'));
  CATS.filter(c=>c.sec==='lower').forEach(cat=>{
    const filled=vp.scores[cat.id]!==undefined;
    const sugg=(!filled&&myTurn)?calcScore(cat.id,cp.dice):null;
    sc.appendChild(makeScoreRow(cat,vp,filled,sugg,myTurn));
  });
  sc.appendChild(makeTotalRow('GRAND TOTAL',calcGrand(vp.scores),'total-row'));
}

function makeSectionHdr(label){
  const row=document.createElement('div'); row.className='sc-row sec-hdr';
  row.innerHTML='<div class="cat-cell"><div class="cat-name">'+label+'</div></div>'+
    '<div class="score-cell" style="font-size:.62rem;color:var(--muted)">Score</div>';
  return row;
}
function makeTotalRow(label,val,cls,btnCls='stat-val'){
  const row=document.createElement('div'); row.className='sc-row '+(cls||'total-row');
  row.innerHTML='<div class="cat-cell"><div class="cat-name">'+label+'</div></div>'+
    '<div class="score-cell"><button class="score-btn '+btnCls+'" disabled>'+val+'</button></div>';
  return row;
}
function makeScoreRow(cat,vp,filled,sugg,myTurn){
  const cp=players[currentTurnIdx];
  const canScore=!filled&&myTurn;
  const row=document.createElement('div'); row.className='sc-row';
  const scoreVal=filled?vp.scores[cat.id]:null;
  let btnCls='score-btn', btnTxt='', btnDis=false;
  if(filled){
    btnCls+=' filled'; btnTxt=scoreVal===0?'—':String(scoreVal); btnDis=true;
  } else if(sugg!==null&&sugg!==undefined){
    btnCls+=' suggested'; btnTxt=sugg>0?'+'+sugg:'0'; btnDis=false;
  } else {
    btnDis=!canScore;
  }
  row.innerHTML=
    '<div class="cat-cell"><div class="cat-name">'+cat.name+'</div><div class="cat-hint">'+cat.hint+'</div></div>'+
    '<div class="score-cell"></div>';
  const btn=document.createElement('button');
  btn.className=btnCls; btn.textContent=btnTxt; btn.disabled=btnDis;
  btn.addEventListener('click',()=>scoreCategory(vp.id,cat.id));
  row.querySelector('.score-cell').appendChild(btn);
  return row;
}

// ══ SCORING ════════════════════════════════════════════
function scoreCategory(pid,catId){
  const p=players.find(x=>x.id===pid);
  const cp=players[currentTurnIdx];
  if(!p||!cp||cp.id!==pid) return;
  if(p.scores[catId]!==undefined) return;
  if(cp.rollsLeft===3){ showToast('Roll the dice first!'); return; }

  const score=calcScore(catId,cp.dice);
  p.scores[catId]=score;
  playDing();

  if(catId==='yahtzee'&&score===50){ playFanfare(); showYtzBlast(); }
  // Bonus Yahtzee
  if(catId!=='yahtzee'&&cp.dice.every(d=>d===cp.dice[0])&&p.scores.yahtzee===50){
    p.scores.yBonus=(p.scores.yBonus||0)+100;
    playFanfare();
  }

  cp.rollsLeft=3; cp.held=[false,false,false,false,false];
  document.getElementById('dice-info').innerHTML='Roll the dice to begin your turn!';
  currentTurnIdx=(currentTurnIdx+1)%players.length;
  viewingPlayer=players[currentTurnIdx].id;

  const allDone=players.every(pl=>countFilled(pl.scores)>=SCORED.length);
  if(allDone){
    gameOver=true; pushAll();
    show('gameover-area'); hide('game-area');
    renderGameOver(); return;
  }
  showToast(p.name+' scored '+score+' pts!');
  pushAll(); renderGame();
}

// ══ SCORE CALCULATIONS ═════════════════════════════════
function calcScore(id,dice){
  const cnt=Array(7).fill(0); dice.forEach(d=>cnt[d]++);
  const sum=dice.reduce((a,b)=>a+b,0);
  switch(id){
    case 'aces':    return dice.filter(d=>d===1).reduce((a,b)=>a+b,0);
    case 'twos':    return dice.filter(d=>d===2).reduce((a,b)=>a+b,0);
    case 'threes':  return dice.filter(d=>d===3).reduce((a,b)=>a+b,0);
    case 'fours':   return dice.filter(d=>d===4).reduce((a,b)=>a+b,0);
    case 'fives':   return dice.filter(d=>d===5).reduce((a,b)=>a+b,0);
    case 'sixes':   return dice.filter(d=>d===6).reduce((a,b)=>a+b,0);
    case 'threeKind': return cnt.some(c=>c>=3)?sum:0;
    case 'fourKind':  return cnt.some(c=>c>=4)?sum:0;
    case 'fullHouse': return(cnt.some(c=>c===3)&&cnt.some(c=>c===2))||cnt.some(c=>c===5)?25:0;
    case 'smStr':{
      const u=[...new Set(dice)].map(Number).sort((a,b)=>a-b);
      let run=1,max=1;
      for(let i=1;i<u.length;i++){if(u[i]===u[i-1]+1){run++;if(run>max)max=run;}else if(u[i]!==u[i-1])run=1;}
      return max>=4?30:0;
    }
    case 'lgStr':{
      const u=[...new Set(dice)].map(Number).sort((a,b)=>a-b);
      let run=1,max=1;
      for(let i=1;i<u.length;i++){if(u[i]===u[i-1]+1){run++;if(run>max)max=run;}else if(u[i]!==u[i-1])run=1;}
      return max>=5?40:0;
    }
    case 'yahtzee': return cnt.some(c=>c===5)?50:0;
    case 'chance':  return sum;
    case 'yBonus':  return 0;
    default:        return 0;
  }
}
function calcUpperRaw(s){ return UPPER.reduce((a,c)=>a+(s[c]||0),0); }
function calcGrand(s){
  const u=calcUpperRaw(s), bonus=u>=63?35:0;
  const l=LOWER.reduce((a,c)=>a+(s[c]||0),0);
  return u+bonus+l;
}
function countFilled(s){ return SCORED.filter(k=>s[k]!==undefined).length; }

// ══ GAME OVER ══════════════════════════════════════════
function renderGameOver(){
  const sorted=[...players].sort((a,b)=>calcGrand(b.scores)-calcGrand(a.scores));
  document.getElementById('winner-name').textContent='🏆 '+sorted[0].name+' wins!';
  const medals=['🥇','🥈','🥉'];
  document.getElementById('final-scores').innerHTML=sorted.map((p,i)=>
    '<div class="fs-row">'+
    '<span style="font-weight:800;color:'+p.color+'">'+(medals[i]||'')+'  '+esc(p.name)+'</span>'+
    '<span class="fs-score">'+calcGrand(p.scores)+'</span></div>'
  ).join('');
}

function newGame(){
  gameStarted=false; gameOver=false; viewingPlayer=null;
  hide('game-area'); hide('gameover-area'); show('setup-screen');
  initSetup(); pushPartial({gameStarted:false,gameOver:false});
}

// ══ YAHTZEE BLAST ══════════════════════════════════════
function showYtzBlast(){
  const el=document.getElementById('ytz-blast');
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),1800);
}

// ══ QR ═════════════════════════════════════════════════
function openQR(){
  const url=window.location.href;
  document.getElementById('qr-url').textContent=url;
  if(!qrDone){
    document.getElementById('qr-box').innerHTML='';
    new QRCode(document.getElementById('qr-box'),{
      text:url,width:200,height:200,
      colorDark:'#f5c842',colorLight:'#16213e',
      correctLevel:QRCode.CorrectLevel.H
    });
    qrDone=true;
  }
  document.getElementById('qr-modal').classList.add('show');
}
function closeQR(){ document.getElementById('qr-modal').classList.remove('show'); }

// ══ HELPERS ════════════════════════════════════════════
function show(id){ document.getElementById(id).style.display='block'; }
function hide(id){ document.getElementById(id).style.display='none'; }
function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2400);
}
function showErr(msg){
  const b=document.getElementById('err-banner'); b.textContent='⚠️ '+msg; b.classList.add('show');
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ══ WIRE UP ALL BUTTONS HERE (no onclick in HTML) ═══════
document.getElementById('add-player-btn').addEventListener('click', addPlayerInput);
document.getElementById('start-game-btn').addEventListener('click', startGame);
document.getElementById('roll-btn').addEventListener('click', rollDice);
document.getElementById('new-game-btn').addEventListener('click', newGame);
document.getElementById('play-again-btn').addEventListener('click', newGame);
document.getElementById('qr-btn').addEventListener('click', openQR);
document.getElementById('close-qr-btn').addEventListener('click', closeQR);
document.getElementById('qr-modal').addEventListener('click', e=>{
  if(e.target===document.getElementById('qr-modal')) closeQR();
});

// ══ INIT ═══════════════════════════════════════════════
initSetup();

</script>
