<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>🎲 Yahtzee Live</title>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --ink:#222;--bg:#fff;--hbg:#f2f2f2;--card:#fafafa;
  --gold:#d4a017;--green:#15803d;--red:#cc0000;
  --sbg:#dcfce7;--zbg:#fee2e2;
  --fxs:clamp(.52rem,1.4vw,.72rem);
  --fsm:clamp(.62rem,1.7vw,.82rem);
  --fmd:clamp(.72rem,2vw,.95rem);
  --die:clamp(40px,9.5vw,68px);
  --pip:clamp(5px,1.2vw,9px);
  --pad:clamp(6px,2vw,16px);
  --gap:clamp(3px,.9vw,8px);
  --row:clamp(20px,3.8vw,30px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#ddd;min-height:100vh;
  display:flex;justify-content:center;align-items:flex-start;
  padding:clamp(4px,1.5vw,20px);
}
.card{
  width:100%;max-width:min(98vw,660px);
  background:var(--bg);border:2px solid var(--ink);
  padding:var(--pad);box-shadow:0 4px 16px rgba(0,0,0,.12);
}
/* TABS */
.tabs{display:flex;gap:2px;margin-bottom:var(--gap);overflow-x:auto;padding-bottom:1px;}
.tab{
  background:#f0f0f0;border:1px solid #bbb;border-bottom:none;
  border-radius:3px 3px 0 0;
  padding:clamp(2px,.6vw,5px) clamp(6px,1.6vw,14px);
  font-size:var(--fxs);font-weight:700;cursor:pointer;white-space:nowrap;
  flex-shrink:0;color:#777;transition:all .15s;line-height:1.3;
}
.tab.active{background:var(--bg);border-color:var(--ink);color:var(--ink);}
.tab.myturn::after{content:' 🎲';font-size:var(--fxs);}
.tab-pts{font-size:calc(var(--fxs) - .06rem);color:#999;font-weight:400;}
/* NAME BAR */
.namebar{
  display:flex;align-items:center;gap:var(--gap);
  border-bottom:1px solid #ccc;margin-bottom:var(--gap);
  padding-bottom:clamp(2px,.5vw,5px);
}
.nb-label{font-size:var(--fsm);font-weight:800;white-space:nowrap;}
.nb-name{font-size:var(--fsm);font-weight:700;flex:1;}
.nb-score{font-size:var(--fxs);color:#555;white-space:nowrap;}
.dot{width:clamp(6px,1.2vw,9px);height:clamp(6px,1.2vw,9px);
  border-radius:50%;background:#aaa;flex-shrink:0;transition:background .3s;}
.dot.on{background:var(--green);}.dot.off{background:var(--red);}
/* DICE PANEL */
.dice-panel{
  background:#f6f6f6;border:1px solid #ccc;border-radius:4px;
  padding:var(--gap);margin-bottom:var(--gap);
}
.dice-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--gap);}
.turn-lbl{font-size:var(--fmd);font-weight:800;}
.roll-lbl{font-size:var(--fxs);color:#555;}
.dice-row{display:flex;justify-content:space-evenly;margin-bottom:var(--gap);}
.die-wrap{display:flex;flex-direction:column;align-items:center;gap:1px;}
.die{
  width:var(--die);height:var(--die);
  border-radius:clamp(5px,1.2vw,10px);background:#fff;
  border:1.5px solid #555;
  display:flex;align-items:center;justify-content:center;
  box-shadow:2px 2px 0 #aaa;transition:border-color .12s,background .12s;
}
.die.held{background:#fffbeb;border:2px solid var(--gold);box-shadow:2px 2px 0 var(--gold);}
.die.rolling{animation:shake .36s ease-in-out;}
@keyframes shake{
  0%,100%{transform:rotate(0)scale(1)}
  20%{transform:rotate(-12deg)scale(1.08)}
  40%{transform:rotate(9deg)scale(.93)}
  60%{transform:rotate(-6deg)scale(1.06)}
  80%{transform:rotate(4deg)scale(.97)}
}
.held-lbl{font-size:clamp(.42rem,1vw,.56rem);font-weight:900;
  color:var(--gold);text-transform:uppercase;height:clamp(7px,1.2vw,10px);line-height:1;}
/* PIPS */
.pg{display:grid;padding:clamp(2px,.5vw,4px);gap:clamp(1px,.3vw,3px);
  width:calc(var(--die)*.74);height:calc(var(--die)*.74);}
.pip{width:var(--pip);height:var(--pip);border-radius:50%;background:#111;}
.p1{grid-template:repeat(3,1fr)/repeat(3,1fr);}
.p1 .pip{grid-column:2;grid-row:2;align-self:center;justify-self:center;}
.p2{grid-template:repeat(2,1fr)/repeat(2,1fr);}
.p2 .pip:nth-child(1){grid-column:1;grid-row:1;align-self:start;justify-self:start;}
.p2 .pip:nth-child(2){grid-column:2;grid-row:2;align-self:end;justify-self:end;}
.p3{grid-template:repeat(3,1fr)/repeat(3,1fr);}
.p3 .pip:nth-child(1){grid-column:1;grid-row:1;}
.p3 .pip:nth-child(2){grid-column:2;grid-row:2;align-self:center;justify-self:center;}
.p3 .pip:nth-child(3){grid-column:3;grid-row:3;}
.p4{grid-template:repeat(2,1fr)/repeat(2,1fr);}
.p5{grid-template:repeat(3,1fr)/repeat(3,1fr);}
.p5 .pip:nth-child(1){grid-column:1;grid-row:1;}
.p5 .pip:nth-child(2){grid-column:3;grid-row:1;}
.p5 .pip:nth-child(3){grid-column:2;grid-row:2;align-self:center;justify-self:center;}
.p5 .pip:nth-child(4){grid-column:1;grid-row:3;}
.p5 .pip:nth-child(5){grid-column:3;grid-row:3;}
.p6{grid-template:repeat(3,1fr)/repeat(2,1fr);}
.dice-btns{display:flex;align-items:center;gap:var(--gap);}
.dice-hint{font-size:var(--fxs);color:#666;flex:1;line-height:1.3;}
.dice-hint b{color:var(--red);}
/* BUTTONS */
.btn{
  padding:clamp(4px,.9vw,8px) clamp(8px,2.2vw,18px);
  border:1.5px solid var(--ink);border-radius:3px;
  cursor:pointer;font-size:var(--fsm);font-weight:700;
  font-family:inherit;display:inline-flex;align-items:center;
  gap:3px;transition:all .12s;white-space:nowrap;
}
.btn:hover{filter:brightness(.9);}
.btn:active{transform:scale(.96);}
.btn-red{background:var(--red);color:#fff;border-color:var(--red);}
.btn-gray{background:#efefef;color:#333;border-color:#999;
  font-size:var(--fxs);padding:clamp(3px,.6vw,6px) clamp(6px,1.4vw,12px);}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important;}
/* TABLE */
table{width:100%;border-collapse:collapse;font-size:var(--fsm);table-layout:fixed;}
th,td{border:1px solid var(--ink);text-align:center;
  padding:clamp(2px,.5vw,4px);height:var(--row);}
.la{text-align:left;padding-left:clamp(3px,.6vw,6px);}
thead th{background:var(--hbg);font-size:var(--fxs);text-transform:uppercase;}
.sh{background:#eee;font-weight:800;text-transform:uppercase;font-size:var(--fsm);}
.tr{font-weight:800;background:#f6f6f6;}
.sb{background:var(--card);}
.col-c{width:34%;}
.col-h{width:28%;}
.col-s{width:38%;}
/* SCORE BUTTONS */
.sb-btn{
  width:100%;height:100%;min-height:clamp(18px,3vw,26px);
  border:none;background:transparent;text-align:center;
  font-size:var(--fmd);font-weight:700;cursor:pointer;
  font-family:inherit;border-radius:1px;transition:all .14s;color:var(--ink);
}
.sb-btn:hover:not(:disabled):not(.filled){background:#e8f4ff;}
.sb-btn.filled{cursor:default;}
.sb-btn.sug{background:var(--sbg);color:var(--green);font-weight:800;
  animation:pulse .9s ease-in-out infinite alternate;}
@keyframes pulse{from{box-shadow:none}to{box-shadow:inset 0 0 6px rgba(21,128,61,.4)}}
.sb-btn.zsug{background:var(--zbg);color:var(--red);}
.sb-btn.stat{cursor:default;}
.sb-btn.bon{color:var(--green);font-weight:800;}
.sb-btn:disabled:not(.filled):not(.stat){opacity:.28;cursor:not-allowed;}
/* TOOLBAR */
.toolbar{display:flex;gap:var(--gap);justify-content:center;flex-wrap:wrap;
  margin-top:var(--gap);padding-top:var(--gap);border-top:1px solid #ddd;}
/* OVERLAYS */
.overlay{
  position:fixed;inset:0;z-index:500;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .22s;
}
.overlay.vis{opacity:1;pointer-events:all;}
/* SETUP */
#ov-setup{background:#ddd;z-index:700;}
.setup-box{
  background:#fff;border:2px solid var(--ink);border-radius:4px;
  padding:clamp(14px,3vw,24px);width:100%;max-width:min(96vw,420px);
  box-shadow:4px 4px 0 rgba(0,0,0,.18);
}
.setup-box h2{font-family:'Permanent Marker',cursive;
  font-size:clamp(1.3rem,5vw,1.9rem);margin-bottom:10px;}
.setup-sub{font-size:var(--fxs);color:#666;margin-bottom:10px;}
.setup-list{display:flex;flex-direction:column;gap:clamp(6px,1.2vw,10px);margin-bottom:12px;}
.setup-row{display:flex;align-items:center;gap:var(--gap);}
.cdot{width:11px;height:11px;border-radius:50%;border:1px solid #aaa;flex-shrink:0;}
.setup-row input{flex:1;border:1px solid #ccc;border-radius:2px;
  padding:clamp(5px,1vw,8px) clamp(6px,1.2vw,10px);
  font-size:var(--fmd);font-family:inherit;}
.del-btn{background:none;border:1px solid #ccc;color:#aaa;
  width:clamp(22px,4vw,28px);height:clamp(22px,4vw,28px);
  border-radius:50%;cursor:pointer;font-size:.85rem;flex-shrink:0;}
.del-btn:hover{background:var(--red);border-color:var(--red);color:#fff;}
.setup-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
/* YAHTZEE BLAST */
#ov-ytz{background:rgba(0,0,0,.55);z-index:600;}
.ytz-word{font-family:'Permanent Marker',cursive;
  font-size:clamp(3rem,15vw,7rem);color:#fff;
  text-shadow:4px 4px 0 var(--red),0 0 40px rgba(255,200,0,.8);
  animation:pop .5s cubic-bezier(.175,.885,.32,1.275) forwards;}
@keyframes pop{0%{transform:scale(0)rotate(-8deg)}60%{transform:scale(1.18)rotate(2deg)}100%{transform:scale(1)rotate(0)}}
.ytz-sub{color:#ffe;font-size:clamp(.75rem,2.2vw,1.1rem);font-weight:700;
  letter-spacing:2px;text-transform:uppercase;margin-top:8px;}
/* QR */
#ov-qr{background:rgba(0,0,0,.7);z-index:500;}
.qr-box{background:#fff;border:2px solid var(--ink);border-radius:4px;
  padding:clamp(14px,3vw,22px);text-align:center;
  width:clamp(240px,80vw,320px);box-shadow:4px 4px 0 rgba(0,0,0,.28);}
.qr-box h3{font-style:italic;font-size:clamp(1rem,3vw,1.4rem);margin-bottom:4px;}
.qr-box p{font-size:var(--fxs);color:#666;margin-bottom:10px;}
#qr-render{display:flex;justify-content:center;margin-bottom:8px;}
.qr-url{font-size:var(--fxs);color:#888;word-break:break-all;
  background:#f2f2f2;padding:5px;border-radius:2px;margin-bottom:12px;}
/* GAME OVER */
#ov-over{background:rgba(255,255,255,.96);z-index:400;
  padding:clamp(12px,3vw,28px);text-align:center;}
#ov-over h2{font-family:'Permanent Marker',cursive;
  font-size:clamp(1.5rem,5.5vw,2.6rem);color:var(--red);margin-bottom:8px;}
.go-winner{font-size:clamp(.85rem,2.5vw,1.1rem);font-weight:700;margin-bottom:12px;}
.go-tbl{width:100%;max-width:min(96vw,500px);border-collapse:collapse;
  font-size:var(--fsm);margin-bottom:14px;}
.go-tbl th{background:#333;color:#fff;padding:clamp(4px,1vw,7px);
  font-size:var(--fxs);text-transform:uppercase;}
.go-tbl td{padding:clamp(5px,1.2vw,9px);border-bottom:1px solid #ddd;text-align:center;}
/* TOAST */
.toast{position:fixed;bottom:clamp(12px,2.5vw,22px);left:50%;
  transform:translateX(-50%)translateY(60px);
  background:#222;color:#fff;
  padding:clamp(5px,1vw,9px) clamp(12px,2.5vw,20px);
  border-radius:3px;font-size:var(--fsm);font-weight:700;z-index:900;
  transition:transform .26s;pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%)translateY(0);}
/* RESPONSIVE */
@media(max-width:374px){
  :root{--die:36px;--pip:5px;--fxs:.5rem;--fsm:.58rem;--fmd:.65rem;--row:18px;}
}
@media(max-height:480px) and (orientation:landscape){
  :root{--die:34px;--pip:4px;--fxs:.48rem;--fsm:.56rem;--fmd:.63rem;--row:16px;--gap:2px;--pad:4px;}
  body{padding:3px;}
  .dice-panel{margin-bottom:3px;}
}
@media(min-width:600px){
  :root{--die:56px;--pip:9px;--fxs:.65rem;--fsm:.78rem;--fmd:.9rem;--row:27px;--pad:14px;}
  body{padding:16px;}
}
@media(min-width:900px){
  :root{--die:66px;--pip:10px;--fxs:.7rem;--fsm:.83rem;--fmd:.97rem;--row:31px;--pad:18px;}
  body{align-items:center;padding:24px;}
  .card{box-shadow:0 8px 32px rgba(0,0,0,.16);}
}
@media(min-width:1200px){body{background:#c8c8c8;}}
</style>
</head>
<body>

<!-- SETUP -->
<div class="overlay vis" id="ov-setup">
  <div class="setup-box">
    <h2>🎲 Yahtzee</h2>
    <div class="setup-sub">Enter player names (2–6 players)</div>
    <div class="setup-list" id="setup-list"></div>
    <div class="setup-btns">
      <button class="btn btn-gray" id="btn-add">+ Add Player</button>
      <button class="btn btn-red" id="btn-start">▶ Start Game</button>
    </div>
  </div>
</div>

<!-- YAHTZEE BLAST -->
<div class="overlay" id="ov-ytz">
  <div class="ytz-word">YAHTZEE!</div>
  <div class="ytz-sub" id="ytz-sub">5 OF A KIND</div>
</div>

<!-- QR -->
<div class="overlay" id="ov-qr">
  <div class="qr-box">
    <h3>🎲 Join Game</h3>
    <p>Scan to play on your device</p>
    <div id="qr-render"></div>
    <div class="qr-url" id="qr-url"></div>
    <button class="btn btn-gray" id="btn-close-qr">✕ Close</button>
  </div>
</div>

<!-- GAME OVER -->
<div class="overlay" id="ov-over">
  <h2>🏆 Game Over!</h2>
  <div class="go-winner" id="go-winner"></div>
  <table class="go-tbl">
    <thead><tr><th>#</th><th>Player</th><th>Upper</th><th>Bonus</th><th>Lower</th><th>Total</th></tr></thead>
    <tbody id="go-body"></tbody>
  </table>
  <button class="btn btn-red" id="btn-again">🎲 Play Again</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- MAIN CARD -->
<div class="card" id="main-card" style="display:none">
  <div class="tabs" id="tabs"></div>
  <div class="namebar">
    <span class="nb-label">NAME:</span>
    <span class="nb-name" id="vname"></span>
    <span class="nb-score" id="vscore"></span>
    <div class="dot" id="conn-dot"></div>
  </div>
  <div class="dice-panel">
    <div class="dice-top">
      <div class="turn-lbl" id="turn-lbl">—</div>
      <div class="roll-lbl" id="roll-lbl">3 rolls left</div>
    </div>
    <div class="dice-row" id="dice-row"></div>
    <div class="dice-btns">
      <div class="dice-hint" id="dice-hint">Roll to start your turn</div>
      <button class="btn btn-red" id="btn-roll">🎲 Roll</button>
    </div>
  </div>
  <table>
    <thead>
      <tr class="sh">
        <th class="la col-c">Upper Section</th>
        <th class="col-h">How to Score</th>
        <th class="col-s">Score</th>
      </tr>
    </thead>
    <tbody id="sc-body"></tbody>
  </table>
  <div class="toolbar">
    <button class="btn btn-gray" id="btn-qr">📲 QR Code</button>
    <button class="btn btn-gray" id="btn-new">↺ New Game</button>
  </div>
</div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import{getDatabase,ref,set,onValue}from'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

/* ══ FIREBASE ══════════════════════════════════════════ */
const app=initializeApp({databaseURL:'https://scoreboard-1677c-default-rtdb.firebaseio.com/'});
const db=getDatabase(app);
const ROOT='ytz5';

/* ══ AUDIO ══════════════════════════════════════════════ */
let _ac=null;
const AC=()=>_ac||(_ac=new(window.AudioContext||window.webkitAudioContext)());
function ding(){try{const c=AC(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(880,c.currentTime);o.frequency.exponentialRampToValueAtTime(1320,c.currentTime+.1);g.gain.setValueAtTime(.25,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.3);o.start();o.stop(c.currentTime+.32);}catch(e){}}
function rollSnd(){try{const c=AC();[0,.04,.08,.12,.16].forEach(t=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='triangle';o.frequency.setValueAtTime(80+Math.random()*260,c.currentTime+t);g.gain.setValueAtTime(.08,c.currentTime+t);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+t+.06);o.start(c.currentTime+t);o.stop(c.currentTime+t+.07);});}catch(e){}}
function fanfare(){try{const c=AC();[[523,0],[659,.12],[784,.24],[1047,.38],[1319,.5],[1047,.6],[1319,.7],[1568,.8]].forEach(([f,t])=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='triangle';const ct=c.currentTime+t;o.frequency.setValueAtTime(f,ct);g.gain.setValueAtTime(.25,ct);g.gain.exponentialRampToValueAtTime(.001,ct+.2);o.start(ct);o.stop(ct+.22);});}catch(e){}}

/* ══ CONSTANTS ══════════════════════════════════════════ */
const COLORS=['#c2410c','#1d4ed8','#15803d','#7e22ce','#b45309','#be185d'];
const CATS=[
  {id:'aces',   name:'Aces',        hint:'Add 1s',        sec:'U'},
  {id:'twos',   name:'Twos',        hint:'Add 2s',        sec:'U'},
  {id:'threes', name:'Threes',      hint:'Add 3s',        sec:'U'},
  {id:'fours',  name:'Fours',       hint:'Add 4s',        sec:'U'},
  {id:'fives',  name:'Fives',       hint:'Add 5s',        sec:'U'},
  {id:'sixes',  name:'Sixes',       hint:'Add 6s',        sec:'U'},
  {id:'threeK', name:'3 of a kind', hint:'Total all dice',sec:'L'},
  {id:'fourK',  name:'4 of a kind', hint:'Total all dice',sec:'L'},
  {id:'fullH',  name:'Full House',  hint:'Score 25',      sec:'L'},
  {id:'smStr',  name:'Sm. Straight',hint:'Score 30',      sec:'L'},
  {id:'lgStr',  name:'Lg. Straight',hint:'Score 40',      sec:'L'},
  {id:'yahtzee',name:'YAHTZEE 🎲',  hint:'Score 50',      sec:'L'},
  {id:'chance', name:'Chance',      hint:'Total all 5',   sec:'L'},
];
const U_IDS=CATS.filter(c=>c.sec==='U').map(c=>c.id);
const L_IDS=CATS.filter(c=>c.sec==='L').map(c=>c.id);
const ALL_IDS=CATS.map(c=>c.id);

/* ══ STATE ══════════════════════════════════════════════
   `state`   = mirror of Firebase (shared by all devices)
   `viewPid` = LOCAL — which player's scorecard I'm viewing
   `myPid`   = LOCAL — which player I am on this device
                       (set at game start, persisted in sessionStorage)
   ══════════════════════════════════════════════════════ */
let state={players:[],curIdx:0,started:false,over:false};
let viewPid=null;
let myPid=null;
let setupRows=[];
let qrDone=false;
let pushing=false;

/* Restore identity if page was refreshed */
try{myPid=sessionStorage.getItem('ytz_myPid');}catch(e){}

/* ══ FIREBASE PUSH ══════════════════════════════════════
   No ignoreRemote flag — we simply accept every Firebase
   update as the truth. Local optimistic updates + Firebase
   echo = idempotent and always consistent.
   ══════════════════════════════════════════════════════ */
function push(s){
  pushing=true;
  set(ref(db,ROOT),JSON.parse(JSON.stringify(s)))
    .catch(e=>toast('Sync error: '+e.message))
    .finally(()=>pushing=false);
}

/* Firebase connection status */
onValue(ref(db,'.info/connected'),snap=>{
  const on=!!snap.val();
  const d=document.getElementById('conn-dot');
  if(d)d.className='dot '+(on?'on':'off');
});

/* Main listener — fires on every change from any device */
onValue(ref(db,ROOT),snap=>{
  const raw=snap.val();
  if(!raw)return;
  state=normalize(raw);   // fix Firebase array-as-object issue
  onStateChange();
},e=>toast('DB: '+e.message));

/* Firebase turns arrays into {0:v,1:v} objects — convert back */
function toArr(v,def=[]){
  if(!v)return def;
  if(Array.isArray(v))return v;
  if(typeof v==='object'){
    const keys=Object.keys(v).map(Number).sort((a,b)=>a-b);
    return keys.map(k=>v[k]);
  }
  return def;
}
function normalize(d){
  const players=toArr(d.players,[]).map(p=>({
    id:p.id||'',
    name:p.name||'',
    color:p.color||'#333',
    scores:p.scores||{},
    yBonus:p.yBonus||0,
    rollsLeft:p.rollsLeft!=null?p.rollsLeft:3,
    dice:toArr(p.dice,[1,1,1,1,1]),
    held:toArr(p.held,[false,false,false,false,false]),
  }));
  return{
    players,
    curIdx:Number(d.curIdx)||0,
    started:!!d.started,
    over:!!d.over,
  };
}

/* ══ STATE HANDLER ══════════════════════════════════════ */
function onStateChange(){
  if(state.over){
    showOnly('ov-over');
    renderGameOver();
    return;
  }
  if(state.started){
    document.getElementById('main-card').style.display='block';
    showOnly(null);
    // Keep viewPid valid; default to current-turn player
    if(!state.players.find(p=>p.id===viewPid)){
      viewPid=curP()?.id||state.players[0]?.id||null;
    }
    renderAll();
    return;
  }
  document.getElementById('main-card').style.display='none';
  showOnly('ov-setup');
}

function curP(){return state.players[state.curIdx]||null;}

/* ══ SETUP ══════════════════════════════════════════════ */
function initSetup(){
  setupRows=[{name:'',color:COLORS[0]},{name:'',color:COLORS[1]}];
  renderSetup();
}
function renderSetup(){
  const list=document.getElementById('setup-list');list.innerHTML='';
  setupRows.forEach((r,i)=>{
    const row=document.createElement('div');row.className='setup-row';
    const dot=document.createElement('div');dot.className='cdot';dot.style.background=r.color;
    const inp=document.createElement('input');
    inp.type='text';inp.placeholder='Player '+(i+1);inp.value=r.name;inp.maxLength=14;
    inp.addEventListener('input',()=>setupRows[i].name=inp.value);
    row.appendChild(dot);row.appendChild(inp);
    if(setupRows.length>1){
      const del=document.createElement('button');del.className='del-btn';del.textContent='×';
      del.addEventListener('click',()=>{setupRows.splice(i,1);renderSetup();});
      row.appendChild(del);
    }
    list.appendChild(row);
  });
}
function startGame(){
  /* Each player in setupRows corresponds to a device.
     Player 1 is this device (myPid = players[0].id).
     Others join by loading the same URL — they become
     the next player whose myPid isn't taken. */
  const ts=Date.now();
  const players=setupRows.map((r,i)=>({
    id:'p'+ts+i,
    name:r.name.trim()||'Player '+(i+1),
    color:COLORS[i%COLORS.length],
    scores:{},yBonus:0,rollsLeft:3,
    dice:[1,1,1,1,1],held:[false,false,false,false,false],
  }));
  /* This device becomes Player 1 */
  myPid=players[0].id;
  viewPid=players[0].id;
  try{sessionStorage.setItem('ytz_myPid',myPid);}catch(e){}
  const newState={players,curIdx:0,started:true,over:false};
  state=newState;
  push(newState);
  document.getElementById('main-card').style.display='block';
  showOnly(null);
  renderAll();
}

/* ══ RENDER ══════════════════════════════════════════════ */
function renderAll(){renderTabs();renderDicePanel();renderScorecard();}

function renderTabs(){
  const bar=document.getElementById('tabs');bar.innerHTML='';
  state.players.forEach((p,i)=>{
    const active=p.id===viewPid,isMyTurn=i===state.curIdx;
    const t=document.createElement('div');
    t.className='tab'+(active?' active':'')+(isMyTurn?' myturn':'');
    if(active){t.style.color=p.color;t.style.borderColor=p.color;}
    t.innerHTML=esc(p.name)+'<br><span class="tab-pts">'+calcGrand(p)+'pt</span>';
    t.addEventListener('click',()=>{viewPid=p.id;renderAll();});
    bar.appendChild(t);
  });
  const vp=getVP();
  if(vp){
    document.getElementById('vname').textContent=vp.name;
    document.getElementById('vname').style.color=vp.color;
    document.getElementById('vscore').textContent='Total: '+calcGrand(vp);
  }
}

function renderDicePanel(){
  const cp=curP();if(!cp)return;
  const imt=isItMyTurn();
  // Turn label
  const tl=document.getElementById('turn-lbl');
  tl.textContent=cp.name+"'s Turn";tl.style.color=cp.color;
  // Roll count
  document.getElementById('roll-lbl').textContent=
    cp.rollsLeft>0?cp.rollsLeft+' roll'+(cp.rollsLeft!==1?'s':'')+' left':'No rolls left';
  // Roll button disabled unless it's my turn and I have rolls left
  document.getElementById('btn-roll').disabled=!imt||cp.rollsLeft<=0;
  // Dice
  const row=document.getElementById('dice-row');row.innerHTML='';
  for(let i=0;i<5;i++){
    const wrap=document.createElement('div');wrap.className='die-wrap';
    const die=document.createElement('div');
    die.className='die'+(cp.held[i]?' held':'');
    die.appendChild(mkPips(cp.dice[i]));
    die.style.cursor=imt?'pointer':'default';
    if(imt)die.addEventListener('click',()=>toggleHold(i));
    const lbl=document.createElement('div');lbl.className='held-lbl';
    lbl.textContent=cp.held[i]?'HELD':'';
    wrap.appendChild(die);wrap.appendChild(lbl);row.appendChild(wrap);
  }
  // Hint
  const hint=document.getElementById('dice-hint');
  if(!imt)hint.innerHTML='Waiting for <b>'+esc(cp.name)+'</b>…';
  else if(cp.rollsLeft===3)hint.textContent='Roll to start your turn';
  else if(cp.rollsLeft===0)hint.innerHTML='<b>Pick a scoring box!</b>';
  else hint.innerHTML='Tap dice to <b>hold</b>, then roll again';
}

function mkPips(v){
  const g=document.createElement('div');g.className='pg p'+v;
  for(let i=0;i<v;i++){const p=document.createElement('div');p.className='pip';g.appendChild(p);}
  return g;
}

function renderScorecard(){
  const vp=getVP();if(!vp)return;
  const cp=curP();
  /* Show suggestions ONLY when:
     1. I am the active player on this device
     2. I am viewing MY OWN scorecard
     3. I have rolled at least once this turn */
  const showSugg=isItMyTurn()&&vp.id===cp?.id&&cp.rollsLeft<3;
  const body=document.getElementById('sc-body');body.innerHTML='';

  CATS.filter(c=>c.sec==='U').forEach(cat=>body.appendChild(mkRow(cat,vp,cp,showSugg)));

  const uRaw=calcU(vp),bonus=uRaw>=63?35:0;
  body.appendChild(mkStatRow('TOTAL SCORE','',uRaw,false));
  body.appendChild(mkBonusRow(bonus));
  body.appendChild(mkStatRow('TOTAL (Upper)','',uRaw+bonus,true));

  const lh=document.createElement('tr');
  lh.innerHTML='<td colspan="3" class="sh la" style="font-size:var(--fxs)">Lower Section</td>';
  body.appendChild(lh);

  CATS.filter(c=>c.sec==='L').forEach(cat=>body.appendChild(mkRow(cat,vp,cp,showSugg)));

  const yb=vp.yBonus||0;
  const ybr=document.createElement('tr');
  ybr.innerHTML=
    '<td class="la" style="font-size:var(--fxs)">YAHTZEE BONUS</td>'+
    '<td style="font-size:var(--fxs);color:#777">+100 each</td>'+
    '<td><button class="sb-btn stat'+(yb>0?' bon':'')+'">'+
    (yb>0?'×'+yb+'='+(yb*100):'—')+'</button></td>';
  body.appendChild(ybr);

  const grand=calcGrand(vp);
  const gr=document.createElement('tr');gr.className='tr';
  gr.innerHTML='<td class="la" colspan="2"><b>GRAND TOTAL</b></td>'+
    '<td><button class="sb-btn stat" style="font-weight:900">'+grand+'</button></td>';
  body.appendChild(gr);

  document.getElementById('vname').textContent=vp.name;
  document.getElementById('vname').style.color=vp.color;
  document.getElementById('vscore').textContent='Total: '+grand;
}

function mkRow(cat,vp,cp,showSugg){
  const tr=document.createElement('tr');
  const filled=vp.scores[cat.id]!==undefined;
  const isYtz5=cp&&cp.dice.length===5&&cp.dice.every(d=>d===cp.dice[0]);
  const joker=isYtz5&&vp.scores.yahtzee!==undefined;
  const sugg=(!filled&&showSugg&&cp)?calcScore(cat.id,cp.dice,vp,joker):null;

  const td1=document.createElement('td');td1.className='la';
  td1.style.fontSize='var(--fsm)';td1.textContent=cat.name;
  const td2=document.createElement('td');
  td2.style.fontSize='var(--fxs)';td2.style.color='#777';td2.textContent=cat.hint;
  const td3=document.createElement('td');td3.className='sb';
  const btn=document.createElement('button');btn.className='sb-btn';

  if(filled){
    btn.classList.add('filled');btn.textContent=String(vp.scores[cat.id]);btn.disabled=true;
  } else if(sugg!==null){
    btn.classList.add(sugg>0?'sug':'zsug');
    btn.textContent=sugg>0?'+'+sugg:'0';
    btn.addEventListener('click',()=>scoreIt(vp.id,cat.id));
  } else {
    btn.disabled=true;btn.textContent='';
  }
  td3.appendChild(btn);
  tr.appendChild(td1);tr.appendChild(td2);tr.appendChild(td3);
  return tr;
}
function mkStatRow(label,_,val,bold){
  const tr=document.createElement('tr');tr.className='tr';
  tr.innerHTML='<td class="la" colspan="2" style="font-size:var(--fxs)">'
    +(bold?'<b>':'')+label+(bold?'</b>':'')+'</td>'
    +'<td><button class="sb-btn stat">'+val+'</button></td>';
  return tr;
}
function mkBonusRow(val){
  const tr=document.createElement('tr');
  tr.innerHTML='<td class="la" style="font-size:var(--fxs)"><b>BONUS (if ≥63)</b></td>'
    +'<td style="font-size:var(--fxs);color:#777">Score 35</td>'
    +'<td><button class="sb-btn stat'+(val>0?' bon':'')+'">'+
    (val>0?'+35':'—')+'</button></td>';
  return tr;
}

/* ══ ACTIONS ═════════════════════════════════════════════
   All actions mutate local state immediately (instant UI),
   then push to Firebase. Firebase echo is idempotent.
   ══════════════════════════════════════════════════════ */
function toggleHold(i){
  const cp=curP();
  if(!cp||cp.rollsLeft===3){toast('Roll first!');return;}
  cp.held[i]=!cp.held[i];
  renderDicePanel();
  push(state);
}

function rollDice(){
  const cp=curP();
  if(!cp||!isItMyTurn()||cp.rollsLeft<=0)return;
  rollSnd();
  document.querySelectorAll('.die').forEach((d,i)=>{
    if(!cp.held[i])d.classList.add('rolling');
  });
  setTimeout(()=>document.querySelectorAll('.die').forEach(d=>d.classList.remove('rolling')),380);
  cp.dice=cp.dice.map((v,i)=>cp.held[i]?v:Math.ceil(Math.random()*6));
  cp.rollsLeft--;
  renderDicePanel();
  renderScorecard();
  push(state);
}

function scoreIt(pid,catId){
  if(!isItMyTurn()){toast("It's not your turn!");return;}
  const cp=curP();
  if(!cp||cp.id!==pid){toast("Wrong player!");return;}
  if(cp.rollsLeft===3){toast('Roll first!');return;}
  const p=state.players.find(x=>x.id===pid);
  if(!p||p.scores[catId]!==undefined)return;

  const isYtz5=cp.dice.every(d=>d===cp.dice[0]);
  const joker=isYtz5&&p.scores.yahtzee!==undefined;
  const score=calcScore(catId,cp.dice,p,joker);
  p.scores[catId]=score;
  ding();

  if(catId==='yahtzee'&&score===50){fanfare();blast('5 OF A KIND • 50 POINTS');}
  if(isYtz5&&catId!=='yahtzee'&&p.scores.yahtzee===50){
    p.yBonus=(p.yBonus||0)+1;
    fanfare();blast('YAHTZEE BONUS! +100 POINTS');
    toast(p.name+' gets Yahtzee Bonus! +100');
  }

  cp.rollsLeft=3;
  cp.held=[false,false,false,false,false];
  state.curIdx=(state.curIdx+1)%state.players.length;

  if(state.players.every(pl=>countFilled(pl)>=13)){
    state.over=true;
    push(state);
    showOnly('ov-over');
    renderGameOver();
    return;
  }
  toast(p.name+' scored '+score+' pts');
  viewPid=curP().id;
  push(state);
  renderAll();
}

/* ══ GAME OVER ══════════════════════════════════════════ */
function renderGameOver(){
  const sorted=[...state.players].sort((a,b)=>calcGrand(b)-calcGrand(a));
  const medals=['🥇','🥈','🥉','4th','5th','6th'];
  document.getElementById('go-winner').innerHTML=
    '<span style="color:'+sorted[0].color+'">🏆 '+esc(sorted[0].name)
    +'</span> wins with '+calcGrand(sorted[0])+' pts!';
  document.getElementById('go-body').innerHTML=sorted.map((p,i)=>{
    const u=calcU(p),bonus=u>=63?35:0;
    const l=L_IDS.reduce((a,id)=>a+(p.scores[id]||0),0)+(p.yBonus||0)*100;
    return'<tr><td>'+medals[i]+'</td>'
      +'<td style="color:'+p.color+';font-weight:700">'+esc(p.name)+'</td>'
      +'<td>'+u+'</td><td>'+bonus+'</td><td>'+l+'</td>'
      +'<td style="font-weight:900;color:'+p.color+'">'+calcGrand(p)+'</td></tr>';
  }).join('');
}
function newGame(){
  myPid=null;viewPid=null;
  try{sessionStorage.removeItem('ytz_myPid');}catch(e){}
  state={players:[],curIdx:0,started:false,over:false};
  push(state);
  document.getElementById('main-card').style.display='none';
  initSetup();
  showOnly('ov-setup');
}

/* ══ SCORE CALC ══════════════════════════════════════════ */
function calcScore(id,dice,player,joker=false){
  const cnt=Array(7).fill(0);dice.forEach(d=>cnt[d]++);
  const sum=dice.reduce((a,b)=>a+b,0);
  if(joker){
    if(id==='fullH')return 25;if(id==='smStr')return 30;if(id==='lgStr')return 40;
    if(['threeK','fourK','chance'].includes(id))return sum;
  }
  switch(id){
    case 'aces':  return dice.filter(d=>d===1).reduce((a,b)=>a+b,0);
    case 'twos':  return dice.filter(d=>d===2).reduce((a,b)=>a+b,0);
    case 'threes':return dice.filter(d=>d===3).reduce((a,b)=>a+b,0);
    case 'fours': return dice.filter(d=>d===4).reduce((a,b)=>a+b,0);
    case 'fives': return dice.filter(d=>d===5).reduce((a,b)=>a+b,0);
    case 'sixes': return dice.filter(d=>d===6).reduce((a,b)=>a+b,0);
    case 'threeK':return cnt.some(c=>c>=3)?sum:0;
    case 'fourK': return cnt.some(c=>c>=4)?sum:0;
    case 'fullH':{const vals=cnt.filter(c=>c>0);return(vals.includes(3)&&vals.includes(2))?25:0;}
    case 'smStr':{const u=[...new Set(dice)].sort((a,b)=>a-b);let r=1,m=1;
      for(let i=1;i<u.length;i++){r=u[i]===u[i-1]+1?r+1:1;m=Math.max(m,r);}return m>=4?30:0;}
    case 'lgStr':{const u=[...new Set(dice)].sort((a,b)=>a-b);if(u.length<5)return 0;let r=1,m=1;
      for(let i=1;i<u.length;i++){r=u[i]===u[i-1]+1?r+1:1;m=Math.max(m,r);}return m>=5?40:0;}
    case 'yahtzee':return cnt.some(c=>c===5)?50:0;
    case 'chance': return sum;
    default:return 0;
  }
}
function calcU(p){return U_IDS.reduce((a,id)=>a+(p.scores[id]||0),0);}
function calcGrand(p){
  const u=calcU(p),bonus=u>=63?35:0;
  const l=L_IDS.reduce((a,id)=>a+(p.scores[id]||0),0);
  return u+bonus+l+(p.yBonus||0)*100;
}
function countFilled(p){return ALL_IDS.filter(id=>p.scores[id]!==undefined).length;}

/* ══ HELPERS ════════════════════════════════════════════ */
function getVP(){return state.players.find(p=>p.id===viewPid)||state.players[0]||null;}
function isItMyTurn(){const cp=curP();return!!(cp&&myPid&&cp.id===myPid);}
function showOnly(id){
  ['ov-setup','ov-ytz','ov-qr','ov-over'].forEach(oid=>{
    const el=document.getElementById(oid);
    if(el)el.classList.toggle('vis',oid===id);
  });
}
function blast(sub){
  document.getElementById('ytz-sub').textContent=sub;
  document.getElementById('ov-ytz').classList.add('vis');
  setTimeout(()=>document.getElementById('ov-ytz').classList.remove('vis'),2200);
}
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* QR */
function openQR(){
  const url=window.location.href;
  document.getElementById('qr-url').textContent=url;
  if(!qrDone){
    document.getElementById('qr-render').innerHTML='';
    new QRCode(document.getElementById('qr-render'),
      {text:url,width:160,height:160,colorDark:'#222',
       colorLight:'#fff',correctLevel:QRCode.CorrectLevel.H});
    qrDone=true;
  }
  showOnly('ov-qr');
}

/* ══ BUTTONS ════════════════════════════════════════════ */
document.getElementById('btn-add').addEventListener('click',()=>{
  if(setupRows.length>=6){toast('Max 6 players');return;}
  setupRows.push({name:'',color:COLORS[setupRows.length%COLORS.length]});renderSetup();
});
document.getElementById('btn-start').addEventListener('click',startGame);
document.getElementById('btn-roll').addEventListener('click',rollDice);
document.getElementById('btn-new').addEventListener('click',newGame);
document.getElementById('btn-again').addEventListener('click',newGame);
document.getElementById('btn-qr').addEventListener('click',openQR);
document.getElementById('btn-close-qr').addEventListener('click',()=>showOnly(null));
document.getElementById('ov-qr').addEventListener('click',e=>{
  if(e.target===document.getElementById('ov-qr'))showOnly(null);
});

/* ══ INIT ════════════════════════════════════════════════
   Firebase onValue fires immediately with current DB state,
   which calls onStateChange() and shows the right screen.
   No manual show/hide needed here.
   ══════════════════════════════════════════════════════ */
initSetup();
</script>
