<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Yahtzee Live</title>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
/* ══════════════════════════════════════════
   CLASSIC YAHTZEE SCORECARD AESTHETIC
   White/cream paper, black ink, red accents
   ══════════════════════════════════════════ */
:root{
  --paper:#fffef8;--paper2:#f5f0e8;--ink:#1a1a1a;--red:#cc0000;
  --red-light:#fee2e2;--gold:#b8860b;--green:#166534;
  --blue:#1e3a8a;--border:#999;--border-dark:#555;
  --shadow:rgba(0,0,0,.18);--r:4px;
  --col-w:72px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;background:#e8e0d0;}
body{font-family:'Source Sans 3',sans-serif;background:#e8e0d0;
  background-image:repeating-linear-gradient(90deg,transparent,transparent 30px,rgba(0,0,0,.02) 30px,rgba(0,0,0,.02) 31px),
                   repeating-linear-gradient(180deg,transparent,transparent 30px,rgba(0,0,0,.02) 30px,rgba(0,0,0,.02) 31px);
  min-height:100vh;color:var(--ink);}

/* ── HEADER ─────────────────────────────── */
.page-hdr{text-align:center;padding:16px 12px 8px;position:relative;z-index:1;}
.logo-wrap{display:inline-flex;align-items:center;gap:10px;
  background:var(--paper);border:3px solid var(--ink);border-radius:6px;
  padding:8px 20px;box-shadow:4px 4px 0 var(--ink);}
.logo{font-family:'Permanent Marker',cursive;font-size:clamp(2rem,9vw,3rem);
  color:var(--ink);letter-spacing:1px;line-height:1;}
.logo-reg{font-size:.6rem;vertical-align:super;color:var(--border-dark);}
.tagline{font-family:'Oswald',sans-serif;font-size:.7rem;letter-spacing:3px;
  text-transform:uppercase;color:var(--red);margin-top:2px;}
.meta-bar{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;
  font-size:.76rem;color:#555;margin:6px 0;font-family:'Oswald',sans-serif;}

/* ── CONN ────────────────────────────────── */
.conn{display:flex;align-items:center;gap:6px;background:var(--paper);
  border:1.5px solid var(--border);border-radius:50px;padding:4px 12px;
  margin:0 auto 10px;width:fit-content;font-size:.72rem;color:#555;
  font-family:'Oswald',sans-serif;letter-spacing:.5px;}
.cdot{width:7px;height:7px;border-radius:50%;background:#aaa;transition:background .4s;}
.cdot.on{background:#15803d;}.cdot.off{background:var(--red);}

/* ── MAIN LAYOUT ─────────────────────────── */
.app{max-width:620px;margin:0 auto;padding:0 10px 100px;}

/* ── SETUP CARD ──────────────────────────── */
.setup-card{background:var(--paper);border:2px solid var(--ink);border-radius:var(--r);
  padding:20px;margin-bottom:14px;box-shadow:4px 4px 0 var(--shadow);}
.setup-card h2{font-family:'Oswald',sans-serif;font-size:1.1rem;letter-spacing:2px;
  text-transform:uppercase;border-bottom:2px solid var(--ink);padding-bottom:8px;margin-bottom:14px;
  display:flex;align-items:center;gap:8px;}
.setup-card h2 .dot-red{color:var(--red);}
.player-inputs{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.pi-row{display:flex;align-items:center;gap:8px;}
.color-swatch{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0;}
.pi-row input{flex:1;border:1.5px solid var(--border-dark);border-radius:3px;
  padding:8px 10px;font-family:'Source Sans 3',sans-serif;font-size:.9rem;
  background:var(--paper2);color:var(--ink);outline:none;transition:border-color .2s;}
.pi-row input:focus{border-color:var(--ink);}
.pi-row input::placeholder{color:#aaa;}
.pi-del{background:none;border:1.5px solid var(--border);color:#999;
  width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:.9rem;
  line-height:1;transition:all .2s;flex-shrink:0;}
.pi-del:hover{background:var(--red);border-color:var(--red);color:#fff;}
.setup-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}

/* ── BUTTONS ─────────────────────────────── */
.btn{padding:9px 20px;border:2px solid var(--ink);border-radius:var(--r);cursor:pointer;
  font-family:'Oswald',sans-serif;font-size:.85rem;font-weight:600;letter-spacing:1px;
  text-transform:uppercase;display:inline-flex;align-items:center;gap:6px;
  transition:all .15s;box-shadow:3px 3px 0 var(--ink);}
.btn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--ink);}
.btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink);}
.btn-red{background:var(--red);color:#fff;border-color:var(--red);box-shadow:3px 3px 0 rgba(0,0,0,.4);}
.btn-red:hover{box-shadow:4px 4px 0 rgba(0,0,0,.4);}
.btn-ink{background:var(--ink);color:#fff;}
.btn-paper{background:var(--paper);color:var(--ink);}
.btn-green-c{background:#166534;color:#fff;border-color:#166534;box-shadow:3px 3px 0 rgba(0,0,0,.4);}
.btn-green-c:hover{box-shadow:4px 4px 0 rgba(0,0,0,.4);}
.btn-sm{padding:6px 14px;font-size:.78rem;}
.btn:disabled,.btn[disabled]{opacity:.4;cursor:not-allowed;transform:none!important;
  box-shadow:2px 2px 0 var(--border)!important;}

/* ── DICE SECTION ────────────────────────── */
.dice-card{background:var(--paper);border:2px solid var(--ink);border-radius:var(--r);
  padding:16px;margin-bottom:12px;box-shadow:4px 4px 0 var(--shadow);}
.dice-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.dice-header-title{font-family:'Oswald',sans-serif;font-size:.75rem;letter-spacing:2px;
  text-transform:uppercase;color:var(--border-dark);}
.turn-badge{background:var(--red);color:#fff;font-family:'Oswald',sans-serif;
  font-size:.75rem;letter-spacing:1.5px;text-transform:uppercase;
  padding:3px 10px;border-radius:2px;}
.dice-row{display:flex;justify-content:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.die-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;}
.die{width:58px;height:58px;border-radius:8px;background:#fff;
  border:2px solid var(--border-dark);
  display:flex;align-items:center;justify-content:center;
  box-shadow:3px 3px 0 var(--border-dark);transition:all .15s;position:relative;}
.die:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--border-dark);}
.die.held{background:#fffbe6;border-color:var(--gold);border-width:2.5px;
  box-shadow:3px 3px 0 var(--gold);}
.die.rolling{animation:shake .4s ease-in-out;}
@keyframes shake{
  0%,100%{transform:rotate(0)}15%{transform:rotate(-12deg) scale(1.1)}
  30%{transform:rotate(10deg) scale(.92)}50%{transform:rotate(-8deg) scale(1.08)}
  70%{transform:rotate(6deg) scale(.95)}85%{transform:rotate(-4deg)}
}
.held-lbl{font-family:'Oswald',sans-serif;font-size:.55rem;letter-spacing:2px;
  color:var(--gold);text-transform:uppercase;height:10px;line-height:1;}

/* PIPS — classic black dots */
.pip-grid{display:grid;width:42px;height:42px;padding:5px;gap:3px;}
.pip{width:8px;height:8px;border-radius:50%;background:var(--ink);}
.p1{grid-template:repeat(3,1fr)/repeat(3,1fr);}
.p1 .pip{grid-column:2;grid-row:2;align-self:center;justify-self:center;}
.p2{grid-template:repeat(2,1fr)/repeat(2,1fr);}
.p2 .pip:nth-child(1){grid-column:1;grid-row:1;align-self:start;justify-self:start;}
.p2 .pip:nth-child(2){grid-column:2;grid-row:2;align-self:end;justify-self:end;}
.p3{grid-template:repeat(3,1fr)/repeat(3,1fr);}
.p3 .pip:nth-child(1){grid-column:1;grid-row:1;align-self:start;}
.p3 .pip:nth-child(2){grid-column:2;grid-row:2;align-self:center;justify-self:center;}
.p3 .pip:nth-child(3){grid-column:3;grid-row:3;align-self:end;justify-self:end;}
.p4{grid-template:repeat(2,1fr)/repeat(2,1fr);}
.p5{grid-template:repeat(3,1fr)/repeat(3,1fr);}
.p5 .pip:nth-child(1){grid-column:1;grid-row:1;}
.p5 .pip:nth-child(2){grid-column:3;grid-row:1;}
.p5 .pip:nth-child(3){grid-column:2;grid-row:2;align-self:center;justify-self:center;}
.p5 .pip:nth-child(4){grid-column:1;grid-row:3;}
.p5 .pip:nth-child(5){grid-column:3;grid-row:3;}
.p6{grid-template:repeat(3,1fr)/repeat(2,1fr);}

.dice-info{text-align:center;font-size:.8rem;color:#555;margin-bottom:10px;
  font-family:'Source Sans 3',sans-serif;min-height:18px;}
.dice-info b{color:var(--red);}
.dice-btns{display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:wrap;}
.rolls-left{font-family:'Oswald',sans-serif;font-size:1rem;font-weight:700;
  color:var(--ink);letter-spacing:1px;}

/* ── PLAYER TABS ─────────────────────────── */
.player-tabs-wrap{overflow-x:auto;margin-bottom:0;padding-bottom:2px;}
.player-tabs{display:flex;gap:0;border-bottom:none;}
.ptab{background:var(--paper2);border:2px solid var(--border-dark);border-bottom:none;
  border-radius:4px 4px 0 0;padding:7px 14px;font-family:'Oswald',sans-serif;
  font-size:.8rem;letter-spacing:.5px;cursor:pointer;white-space:nowrap;
  flex-shrink:0;margin-right:3px;transition:all .15s;color:#666;}
.ptab.active{background:var(--paper);border-color:var(--ink);color:var(--ink);
  position:relative;z-index:2;}
.ptab.active-turn::after{content:'▶';font-size:.55rem;margin-left:4px;color:var(--red);}
.ptab-score{font-size:.68rem;display:block;color:#999;}
.ptab.active .ptab-score{color:var(--border-dark);}

/* ── SCORECARD — exact match to official card ── */
.scorecard-outer{background:var(--paper);border:2px solid var(--ink);
  border-radius:0 var(--r) var(--r) var(--r);box-shadow:4px 4px 0 var(--shadow);overflow:hidden;}

/* Table layout */
.sc-table{width:100%;border-collapse:collapse;}
.sc-table td,.sc-table th{border:1px solid var(--border);padding:0;vertical-align:middle;}
.sc-table tr:last-child td{border-bottom:none;}

/* Column headers */
.sc-table thead th{background:var(--paper2);text-align:center;padding:4px 2px;
  font-family:'Oswald',sans-serif;font-size:.72rem;letter-spacing:.5px;
  color:var(--ink);border-bottom:2px solid var(--ink);}
.sc-table thead th:first-child{text-align:left;padding-left:6px;min-width:130px;}
.sc-table thead th.how-col{font-size:.62rem;color:#555;max-width:80px;line-height:1.2;}

/* Section header rows */
.tr-section{background:var(--ink);}
.tr-section td{padding:5px 8px;font-family:'Oswald',sans-serif;font-size:.75rem;
  letter-spacing:2px;text-transform:uppercase;color:#fff;font-weight:700;}

/* Regular score rows */
.tr-score td.cat-td{padding:6px 8px;}
.cat-name-main{font-family:'Oswald',sans-serif;font-size:.82rem;font-weight:600;
  color:var(--ink);line-height:1.1;}
.cat-hint-text{font-size:.6rem;color:#666;line-height:1.2;margin-top:1px;}

/* Total / bonus rows */
.tr-total{background:var(--paper2);}
.tr-total td.cat-td{padding:6px 8px;}
.tr-total .cat-name-main{font-family:'Oswald',sans-serif;font-size:.78rem;font-weight:700;}
.tr-bonus{background:#fffbe6;}

/* Score cells */
.score-td{text-align:center;padding:3px;}
.score-btn{width:100%;min-height:36px;border:1.5px solid var(--border);
  border-radius:2px;background:#fff;color:var(--ink);
  font-family:'Oswald',sans-serif;font-size:.9rem;font-weight:600;
  cursor:pointer;transition:all .15s;padding:2px;}
.score-btn:hover:not([disabled]):not(.filled):not(.stat){
  background:var(--red-light);border-color:var(--red);color:var(--red);}
.score-btn.filled{background:transparent;border:none;cursor:default;
  color:var(--ink);font-weight:700;font-size:.95rem;}
.score-btn.suggested{background:#dcfce7;border-color:#166534;color:#166534;
  animation:pulse-green .9s ease-in-out infinite alternate;font-weight:700;}
@keyframes pulse-green{from{box-shadow:none}to{box-shadow:0 0 8px rgba(22,101,52,.5)}}
.score-btn.zero-suggest{background:#fee2e2;border-color:var(--red);color:var(--red);}
.score-btn.stat{background:transparent;border:none;cursor:default;
  font-family:'Oswald',sans-serif;font-size:.9rem;font-weight:700;color:var(--ink);}
.score-btn.bonus-earned{color:var(--green);}
.score-btn[disabled]:not(.filled):not(.stat){opacity:.3;cursor:not-allowed;}

/* Joker indicator */
.joker-badge{display:inline-block;background:var(--red);color:#fff;
  font-family:'Oswald',sans-serif;font-size:.5rem;letter-spacing:1px;
  padding:1px 4px;border-radius:2px;vertical-align:middle;margin-left:3px;}

/* ── PLAYERS OVERVIEW BAR ─────────────────── */
.players-overview{display:flex;gap:8px;overflow-x:auto;padding:8px 0;flex-wrap:nowrap;}
.ov-card{background:var(--paper);border:2px solid var(--border-dark);border-radius:var(--r);
  padding:8px 12px;flex-shrink:0;min-width:90px;font-family:'Oswald',sans-serif;}
.ov-card.active-turn{border-color:var(--ink);box-shadow:2px 2px 0 var(--ink);}
.ov-name{font-size:.8rem;font-weight:700;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;max-width:100px;}
.ov-score{font-size:1.2rem;font-weight:700;color:var(--ink);}
.ov-progress{font-size:.62rem;color:#888;margin-top:2px;}

/* ── ACTION BAR ──────────────────────────── */
.action-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(248,243,232,.97);backdrop-filter:blur(8px);
  border-top:2px solid var(--ink);padding:8px 14px 20px;
  display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}

/* ── QR MODAL ────────────────────────────── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);
  display:flex;align-items:center;justify-content:center;z-index:300;
  opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-bg.show{opacity:1;pointer-events:all;}
.modal{background:var(--paper);border:3px solid var(--ink);border-radius:6px;
  padding:24px;text-align:center;max-width:300px;width:90%;box-shadow:6px 6px 0 var(--ink);}
.modal h3{font-family:'Permanent Marker',cursive;color:var(--ink);font-size:1.4rem;margin-bottom:4px;}
.modal p{font-size:.78rem;color:#555;margin-bottom:14px;}
#qr-box{display:flex;justify-content:center;margin-bottom:12px;}
.qr-url{font-size:.62rem;color:#777;word-break:break-all;padding:6px 8px;
  background:var(--paper2);border:1px solid var(--border);border-radius:2px;margin-bottom:14px;}

/* ── YAHTZEE BLAST ────────────────────────── */
.ytz-blast{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;z-index:500;pointer-events:none;opacity:0;transition:opacity .2s;}
.ytz-blast.show{opacity:1;}
.ytz-blast-bg{position:absolute;inset:0;background:rgba(204,0,0,.12);backdrop-filter:blur(2px);}
.ytz-text{font-family:'Permanent Marker',cursive;font-size:min(18vw,110px);
  color:var(--red);text-shadow:4px 4px 0 var(--ink);position:relative;
  animation:ytzPop .55s cubic-bezier(.175,.885,.32,1.275) forwards;}
.ytz-sub{font-family:'Oswald',sans-serif;font-size:1rem;letter-spacing:3px;
  color:var(--ink);margin-top:8px;position:relative;}
@keyframes ytzPop{0%{transform:scale(0) rotate(-8deg)}60%{transform:scale(1.15) rotate(2deg)}100%{transform:scale(1) rotate(0)}}

/* ── TOAST ───────────────────────────────── */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(50px);
  background:var(--ink);color:#fff;font-family:'Oswald',sans-serif;
  font-weight:600;letter-spacing:.5px;padding:9px 20px;border-radius:3px;
  font-size:.85rem;z-index:400;transition:transform .3s;pointer-events:none;
  box-shadow:2px 2px 0 rgba(0,0,0,.3);}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ── GAME OVER ───────────────────────────── */
.gameover-card{background:var(--paper);border:3px solid var(--ink);border-radius:var(--r);
  padding:24px 20px;text-align:center;margin-bottom:14px;box-shadow:5px 5px 0 var(--ink);}
.gameover-card h2{font-family:'Permanent Marker',cursive;color:var(--red);
  font-size:2.2rem;margin-bottom:16px;letter-spacing:1px;}
.winner-line{font-family:'Oswald',sans-serif;font-size:1.4rem;font-weight:700;
  letter-spacing:1px;margin-bottom:16px;}
.final-table{width:100%;border-collapse:collapse;margin:0 0 16px;}
.final-table th{background:var(--ink);color:#fff;padding:7px;
  font-family:'Oswald',sans-serif;font-size:.78rem;letter-spacing:1px;text-transform:uppercase;}
.final-table td{padding:8px;border-bottom:1px solid var(--border);
  font-family:'Oswald',sans-serif;font-size:.9rem;}
.final-table tr:last-child td{border-bottom:none;}
.final-table .rank-td{font-weight:700;font-size:1rem;}
.final-table .score-td-f{font-weight:700;font-size:1.1rem;color:var(--red);}

/* ERR */
.err-banner{background:#fee2e2;border:1.5px solid var(--red);border-radius:var(--r);
  padding:10px 14px;margin-bottom:10px;font-size:.8rem;color:#991b1b;display:none;}
.err-banner.show{display:block;}

/* RESPONSIVE */
@media(max-width:400px){
  .die{width:50px;height:50px;}
  .pip-grid{width:36px;height:36px;}
  .pip{width:7px;height:7px;}
  --col-w:62px;
}
</style>
</head>
<body>

<!-- Yahtzee Blast overlay -->
<div class="ytz-blast" id="ytz-blast">
  <div class="ytz-blast-bg"></div>
  <div class="ytz-text">YAHTZEE!</div>
  <div class="ytz-sub" id="ytz-sub">5 OF A KIND • 50 POINTS</div>
</div>

<!-- QR Modal -->
<div class="modal-bg" id="qr-modal">
  <div class="modal">
    <h3>Join Game</h3>
    <p>Scan to join &amp; see live scores</p>
    <div id="qr-box"></div>
    <div class="qr-url" id="qr-url"></div>
    <button class="btn btn-paper btn-sm" id="close-qr-btn">&#10005; Close</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="err-banner" id="err-banner"></div>

<div class="app">
  <!-- HEADER -->
  <div class="page-hdr">
    <div class="logo-wrap">
      <div>
        <div class="logo">Yahtzee<sup class="logo-reg">®</sup></div>
        <div class="tagline">Live Multiplayer</div>
      </div>
    </div>
    <div class="meta-bar">
      <span id="date-disp"></span>
      <span id="time-disp"></span>
    </div>
  </div>
  <div class="conn"><div class="cdot" id="cdot"></div><span id="ctext">Connecting…</span></div>

  <!-- SETUP -->
  <div class="setup-card" id="setup-screen">
    <h2><span class="dot-red">◆</span> NEW GAME</h2>
    <div class="player-inputs" id="player-inputs"></div>
    <div class="setup-btns">
      <button class="btn btn-paper btn-sm" id="add-player-btn">+ Add Player</button>
      <button class="btn btn-red" id="start-game-btn">▶ Start Game</button>
    </div>
  </div>

  <!-- GAME AREA -->
  <div id="game-area" style="display:none">

    <!-- Players overview -->
    <div class="players-overview" id="players-overview"></div>

    <!-- Dice -->
    <div class="dice-card">
      <div class="dice-header">
        <div class="dice-header-title">🎲 Dice</div>
        <div class="turn-badge" id="turn-badge">Player's Turn</div>
      </div>
      <div class="dice-row" id="dice-row"></div>
      <div class="dice-info" id="dice-info">Roll all 5 dice to begin your turn</div>
      <div class="dice-btns">
        <button class="btn btn-red" id="roll-btn">🎲 Roll Dice</button>
        <span class="rolls-left" id="rolls-left">3 rolls left</span>
      </div>
    </div>

    <!-- Scorecard -->
    <div class="player-tabs-wrap">
      <div class="player-tabs" id="player-tabs"></div>
    </div>
    <div class="scorecard-outer">
      <table class="sc-table" id="sc-table">
        <thead id="sc-head"></thead>
        <tbody id="sc-body"></tbody>
      </table>
    </div>

  </div>

  <!-- GAME OVER -->
  <div id="gameover-area" style="display:none">
    <div class="gameover-card">
      <h2>🏆 Game Over!</h2>
      <div class="winner-line" id="winner-line"></div>
      <table class="final-table" id="final-table">
        <thead><tr>
          <th>#</th><th>Player</th>
          <th>Upper</th><th>Bonus</th><th>Lower</th><th>Total</th>
        </tr></thead>
        <tbody id="final-tbody"></tbody>
      </table>
      <button class="btn btn-red" id="play-again-btn">🎲 Play Again</button>
    </div>
  </div>
</div>

<!-- Fixed bottom bar -->
<div class="action-bar">
  <button class="btn btn-paper btn-sm" id="qr-btn">📲 QR Code</button>
  <button class="btn btn-paper btn-sm" id="new-game-btn">↺ New Game</button>
</div>

<script type="module">

/* ══ FIREBASE ════════════════════════════════════ */
const fbApp = initializeApp({ databaseURL:'https://scoreboard-1677c-default-rtdb.firebaseio.com/' });

/* ══ AUDIO ═══════════════════════════════════════ */
let _ac=null;
const ac=()=>_ac||(_ac=new(window.AudioContext||window.webkitAudioContext)());
function ding(){
  try{const c=ac(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);o.type='sine';
    o.frequency.setValueAtTime(880,c.currentTime);
    o.frequency.exponentialRampToValueAtTime(1320,c.currentTime+.1);
    g.gain.setValueAtTime(.3,c.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.35);
    o.start();o.stop(c.currentTime+.4);}catch(e){}
}
function rollSound(){
  try{const c=ac();
    [0,.04,.08,.12,.16].forEach(t=>{
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);o.type='triangle';
      o.frequency.setValueAtTime(100+Math.random()*300,c.currentTime+t);
      g.gain.setValueAtTime(.1,c.currentTime+t);
      g.gain.exponentialRampToValueAtTime(.001,c.currentTime+t+.07);
      o.start(c.currentTime+t);o.stop(c.currentTime+t+.08);});}catch(e){}
}
function fanfare(){
  try{const c=ac();
    [[523,.0],[659,.12],[784,.24],[1047,.36],[1319,.48],[1047,.6],[1319,.7],[1568,.8]]
    .forEach(([f,t])=>{
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);o.type='triangle';
      const ct=c.currentTime+t;
      o.frequency.setValueAtTime(f,ct);
      g.gain.setValueAtTime(.3,ct);g.gain.exponentialRampToValueAtTime(.001,ct+.25);
      o.start(ct);o.stop(ct+.3);});}catch(e){}
}

/* ══ CONSTANTS ════════════════════════════════════

   ════════════════════════════════════════════════ */
const COLORS=['#c2410c','#1d4ed8','#15803d','#7e22ce','#b45309','#be185d','#0f766e'];

// All 13 scoreable boxes (plus yBonus display row)
const CATS=[

  {id:'fives',  name:'Fives',         hint:'Count & add only Fives',     sec:'U', pip:5},

/* ══ STATE ════════════════════════════════════════ */
let players=[],currentTurnIdx=0,gameStarted=false,gameOver=false;
let ignoreRemote=false,qrDone=false,viewingPlayer=null;

/* ══ CLOCK ════════════════════════════════════════ */
function tick(){

    n.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric',year:'numeric'});

/* ══ FIREBASE ════════════════════════════════════ */
onValue(ref(db,'.info/connected'),s=>{

});
onValue(ref(db,ROOT),s=>{

},e=>showErr(e.message));

function pushPartial(p){
  ignoreRemote=true;
  update(ref(db,ROOT),p).finally(()=>setTimeout(()=>ignoreRemote=false,400));
}
function pushAll(){
  ignoreRemote=true;
  set(ref(db,ROOT),{players,currentTurnIdx,gameStarted,gameOver})
    .finally(()=>setTimeout(()=>ignoreRemote=false,400));
}
function applyRemote(d){
  if(d.players)             players=d.players;
  if(d.currentTurnIdx!=null)currentTurnIdx=d.currentTurnIdx;
  if(d.gameStarted!=null)   gameStarted=d.gameStarted;
  if(d.gameOver!=null)      gameOver=d.gameOver;

  const cp=players[currentTurnIdx];
  if(!cp||cp.rollsLeft===3){showToast('Roll first before holding dice!');return;}

function getColW(){ return window.innerWidth<400?62:72; }

function makeScoreRow(cat,vp,cp,myTurn){
  const tr=document.createElement('tr'); tr.className='tr-score';
  const filled=vp.scores[cat.id]!==undefined;
  const canScore=!filled&&myTurn;

  // Calculate suggested score
  let sugg=null;
  if(canScore&&cp){
    sugg=calcScore(cat.id,cp.dice,vp);
  }

  // Category cell
  const catTd=document.createElement('td'); catTd.className='cat-td';
  catTd.innerHTML='<div class="cat-name-main">'+cat.name+'</div>'+
    '<div class="cat-hint-text">'+cat.hint+'</div>';
  // Highlight yahtzee name
  if(cat.id==='yahtzee'){
    catTd.querySelector('.cat-name-main').style.color=vp.color;
    catTd.querySelector('.cat-name-main').style.fontWeight='900';
  }
  tr.appendChild(catTd);

  // How-to cell (pip count or fixed score for mobile — keep compact)
  const howTd=document.createElement('td');
  howTd.style.cssText='text-align:center;padding:4px 3px;font-size:.68rem;color:#555;max-width:70px;line-height:1.3;';
  howTd.innerHTML=cat.hint.replace('Count & add only ','').replace('Add total of all dice','Sum all dice').replace('Score total of all 5 dice','Sum all 5 dice');
  tr.appendChild(howTd);

  // Score cell
  const scoreTd=document.createElement('td'); scoreTd.className='score-td';
  const btn=document.createElement('button');
  let btnCls='score-btn';
  if(filled){
    btnCls+=' filled';
    btn.textContent=vp.scores[cat.id]===0?'0':String(vp.scores[cat.id]);
    btn.disabled=true;
    if(cat.id==='yahtzee'&&vp.scores[cat.id]===50)btn.style.color=vp.color;
  } else if(sugg!==null){
    if(sugg>0){
      btnCls+=' suggested';
      btn.textContent='+'+sugg;
    } else {
      btnCls+=' zero-suggest';
      btn.textContent='0';
    }
    // Still clickable — scoring 0 is valid
    btn.addEventListener('click',()=>scoreCategory(vp.id,cat.id));
  } else {
    btn.textContent='';
    if(!canScore)btn.disabled=true;
    else btn.addEventListener('click',()=>scoreCategory(vp.id,cat.id));
  }
  btn.className=btnCls;
  scoreTd.appendChild(btn);
  tr.appendChild(scoreTd);
  return tr;
}

function makeTotalRow(label,val,rowCls,btnCls='stat'){
  const tr=document.createElement('tr'); tr.className='tr-total '+(rowCls||'');
  const td1=document.createElement('td'); td1.className='cat-td'; td1.colSpan=2;
  td1.innerHTML='<div class="cat-name-main" style="font-size:.78rem">'+label+'</div>';
  const td2=document.createElement('td'); td2.className='score-td';
  const btn=document.createElement('button');
  btn.className='score-btn '+btnCls; btn.disabled=true; btn.textContent=val;
  td2.appendChild(btn); tr.appendChild(td1); tr.appendChild(td2);
  return tr;
}

/* ══ SCORING — FULL OFFICIAL RULES ════════════════

   JOKER RULE (from rules p.2):
   A Yahtzee may be used as a Joker ONLY when:
   1. The Yahtzee box has been filled (50 or 0)
   2. The appropriate upper section box is filled
   Under Joker rules: Full House=25, Sm.Str=30, Lg.Str=40 always valid

   YAHTZEE BONUS:
   Player receives a bonus chip (+100) for each extra
   Yahtzee IF the first Yahtzee box was scored 50.
   ═════════════════════════════════════════════════ */
function scoreCategory(pid,catId){
  const p=players.find(x=>x.id===pid);
  const cp=players[currentTurnIdx];
  if(!p||!cp||cp.id!==pid)return;
  if(p.scores[catId]!==undefined)return;
  if(cp.rollsLeft===3){showToast('Roll the dice first!');return;}

  // Check Joker conditions
  const isYahtzee5=cp.dice.every(d=>d===cp.dice[0]);
  const jokerActive=isYahtzee5&&p.scores.yahtzee!==undefined; // yahtzee box has been filled

  const score=calcScore(catId,cp.dice,p,jokerActive);
  p.scores[catId]=score;
  ding();

  // First Yahtzee scored as 50
  if(catId==='yahtzee'&&score===50){
    fanfare();
    showYtzBlast('5 OF A KIND • 50 POINTS');
  }

  // Extra Yahtzee bonus (only if first yahtzee box = 50)
  if(isYahtzee5&&catId!=='yahtzee'&&p.scores.yahtzee===50){
    p.yBonusCount=(p.yBonusCount||0)+1;
    fanfare();
    showYtzBlast('YAHTZEE BONUS! +100 POINTS');
    showToast('YAHTZEE BONUS! +100 pts for '+p.name+'!');
  }

  // Reset for next turn
  cp.rollsLeft=3;
  cp.held=[false,false,false,false,false];
  document.getElementById('dice-info').textContent='Roll all 5 dice to begin your turn';

  // Advance turn
  currentTurnIdx=(currentTurnIdx+1)%players.length;
  viewingPlayer=players[currentTurnIdx].id;

  // Check game over — every player has filled all 13 boxes
  const allDone=players.every(pl=>countFilled(pl)>=13);
  if(allDone){
    gameOver=true; pushAll();
    hide('game-area'); show('gameover-area');
    renderGameOver(); return;
  }

  showToast(p.name+' scored '+score+' on '+catId);
  pushAll(); renderGame();
}

/* ══ SCORE CALCULATIONS ═══════════════════════════
   Full rules implementation including Joker
   ═════════════════════════════════════════════════ */
function calcScore(catId,dice,player,jokerMode=false){
  const cnt=Array(7).fill(0); dice.forEach(d=>cnt[d]++);
  const sum=dice.reduce((a,b)=>a+b,0);
  const allSame=dice.every(d=>d===dice[0]);
  const faceVal=dice[0]; // which face if all same (joker)

  // Under Joker mode — certain lower section boxes score fixed amounts
  if(jokerMode){
    if(catId==='fullHouse')return 25;
    if(catId==='smStr')return 30;
    if(catId==='lgStr')return 40;
    if(catId==='threeKind')return sum;
    if(catId==='fourKind')return sum;
    if(catId==='chance')return sum;
    // Upper section under joker — score normally
  }

  switch(catId){
    case 'aces':    return dice.filter(d=>d===1).reduce((a,b)=>a+b,0);
    case 'twos':    return dice.filter(d=>d===2).reduce((a,b)=>a+b,0);
    case 'threes':  return dice.filter(d=>d===3).reduce((a,b)=>a+b,0);
    case 'fours':   return dice.filter(d=>d===4).reduce((a,b)=>a+b,0);
    case 'fives':   return dice.filter(d=>d===5).reduce((a,b)=>a+b,0);
    case 'sixes':   return dice.filter(d=>d===6).reduce((a,b)=>a+b,0);
    case 'threeKind': return cnt.some(c=>c>=3)?sum:0;
    case 'fourKind':  return cnt.some(c=>c>=4)?sum:0;
    case 'fullHouse':{
      // Three of a kind + pair (or five of a kind counts too via Joker only)
      const has3=cnt.some(c=>c===3), has2=cnt.some(c=>c===2);
      return(has3&&has2)?25:0;
    }
    case 'smStr':{
      // Any sequence of 4 consecutive numbers
      const unique=[...new Set(dice)].sort((a,b)=>a-b);
      let run=1,max=1;
      for(let i=1;i<unique.length;i++){
        run=unique[i]===unique[i-1]+1?run+1:1;
        if(run>max)max=run;
      }
      return max>=4?30:0;
    }
    case 'lgStr':{
      // Sequence of 5 consecutive numbers
      const unique=[...new Set(dice)].sort((a,b)=>a-b);
      if(unique.length<5)return 0;
      let run=1,max=1;
      for(let i=1;i<unique.length;i++){
        run=unique[i]===unique[i-1]+1?run+1:1;
        if(run>max)max=run;
      }
      return max>=5?40:0;
    }
    case 'yahtzee': return cnt.some(c=>c===5)?50:0;
    case 'chance':  return sum;
    default:        return 0;
  }
}

/* ══ TOTALS ════════════════════════════════════════ */
function calcUpperRaw(p){
  return UPPER_IDS.reduce((a,id)=>a+(p.scores[id]||0),0);
}
function calcGrand(p){
  const u=calcUpperRaw(p);
  const bonus=u>=63?35:0;
  const lower=LOWER_IDS.reduce((a,id)=>a+(p.scores[id]||0),0);
  const yb=(p.yBonusCount||0)*100;
  return u+bonus+lower+yb;
}
function countFilled(p){
  return SCORED_IDS.filter(id=>p.scores[id]!==undefined).length;
}

/* ══ GAME OVER SCREEN ═════════════════════════════ */
function renderGameOver(){
  const sorted=[...players].sort((a,b)=>calcGrand(b)-calcGrand(a));
  const winner=sorted[0];
  document.getElementById('winner-line').innerHTML=
    '<span style="color:'+winner.color+'">'+esc(winner.name)+'</span> wins with '+calcGrand(winner)+' points!';
  const medals=['🥇','🥈','🥉','4th','5th','6th'];
  document.getElementById('final-tbody').innerHTML=sorted.map((p,i)=>{
    const u=calcUpperRaw(p), bonus=u>=63?35:0;
    const lower=LOWER_IDS.reduce((a,id)=>a+(p.scores[id]||0),0);
    const yb=(p.yBonusCount||0)*100;
    return '<tr>'+'<td class="rank-td">'+medals[i]+'</td>'+
      '<td style="font-weight:700;color:'+p.color+'">'+esc(p.name)+'</td>'+
      '<td>'+u+'</td><td>'+bonus+'</td><td>'+(lower+yb)+'</td>'+
      '<td class="score-td-f">'+calcGrand(p)+'</td></tr>';
  }).join('');
}

function newGame(){
  gameStarted=false; gameOver=false; viewingPlayer=null;
  hide('game-area'); hide('gameover-area'); show('setup-screen');
  initSetup();
  pushPartial({gameStarted:false,gameOver:false});
}

/* ══ YAHTZEE BLAST ════════════════════════════════ */
function showYtzBlast(sub){
  document.getElementById('ytz-sub').textContent=sub||'5 OF A KIND • 50 POINTS';
  const el=document.getElementById('ytz-blast');
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
}

/* ══ QR ════════════════════════════════════════════ */
function openQR(){
  const url=window.location.href;
  document.getElementById('qr-url').textContent=url;
  if(!qrDone){
    document.getElementById('qr-box').innerHTML='';
    new QRCode(document.getElementById('qr-box'),{
      text:url,width:180,height:180,
      colorDark:'#1a1a1a',colorLight:'#fffef8',
      correctLevel:QRCode.CorrectLevel.H});
    qrDone=true;
  }
  document.getElementById('qr-modal').classList.add('show');
}
function closeQR(){ document.getElementById('qr-modal').classList.remove('show'); }

/* ══ UTILS ════════════════════════════════════════ */
function show(id){document.getElementById(id).style.display='block';}
function hide(id){document.getElementById(id).style.display='none';}
function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600);
}
function showErr(msg){
  document.getElementById('err-banner').textContent='⚠️ '+msg;
  document.getElementById('err-banner').classList.add('show');
}
function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ══ WIRE ALL BUTTONS (no onclick in HTML) ════════ */
document.getElementById('add-player-btn').addEventListener('click',()=>{
  if(setupInputs.length>=6){showToast('Max 6 players');return;}
  setupInputs.push({name:'',color:COLORS[setupInputs.length%COLORS.length]});
  renderSetupInputs();
});
document.getElementById('start-game-btn').addEventListener('click',startGame);
document.getElementById('roll-btn').addEventListener('click',rollDice);
document.getElementById('new-game-btn').addEventListener('click',newGame);
document.getElementById('play-again-btn').addEventListener('click',newGame);
document.getElementById('qr-btn').addEventListener('click',openQR);
document.getElementById('close-qr-btn').addEventListener('click',closeQR);
document.getElementById('qr-modal').addEventListener('click',e=>{
  if(e.target===document.getElementById('qr-modal'))closeQR();
});

/* ══ INIT ════════════════════════════════════════= */
initSetup();
</script>
